<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Test Stamboom Visualisatie</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }
  .node rect {
    fill: #cce5ff;
    stroke: #333;
    stroke-width: 1px;
  }
  .node text {
    font-size: 12px;
    text-anchor: middle;
  }
  .link {
    fill: none;
    stroke: #555;
    stroke-width: 1.5px;
  }
  #upload {
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<h2>Stamboom Visualisatie (Test CSV)</h2>
<input type="file" id="upload" accept=".csv" />
<svg width="1000" height="600"></svg>

<script>
// Helper: CSV parser conform multi-value structuur
function parseCSV(csvText) {
    const lines = csvText.split('\n').filter(l => l.trim() !== '');
    const header = lines[0].split(';').map(h => h.trim());
    const people = [];

    for(let i=1; i<lines.length; i++){
        const cols = lines[i].split(';').map(c => c.trim());
        const person = {};
        header.forEach((colName, idx) => {
            let value = cols[idx] || '';
            switch(colName){
                case 'VaderID':
                case 'MoederID':
                    person[colName] = value.split('|').map(rel=>{
                        const [id,type] = rel.split(':');
                        return {ID: id?.trim()||null, Type: type?.trim()||null};
                    });
                    break;
                default:
                    person[colName] = value || null;
            }
        });
        people.push(person);
    }
    return people;
}

// Maak boomdata (verticaal) voor D3
function buildTree(people) {
    const peopleMap = {};
    people.forEach(p => peopleMap[p.ID] = {...p, children: []});

    let root = null;

    people.forEach(p => {
        const vaderID = p.VaderID?.[0]?.ID;
        if(vaderID && peopleMap[vaderID]){
            peopleMap[vaderID].children.push(peopleMap[p.ID]);
        } else if(!root){
            root = peopleMap[p.ID];
        }
    });

    return root;
}

// Visualisatie
function drawTree(root) {
    const svg = d3.select('svg');
    svg.selectAll('*').remove();
    const width = +svg.attr('width');
    const height = +svg.attr('height');

    const treeLayout = d3.tree().size([width-100, height-100]);
    const hierarchyData = d3.hierarchy(root, d => d.children);
    treeLayout(hierarchyData);

    // Links
    svg.selectAll('.link')
        .data(hierarchyData.links())
        .enter()
        .append('line')
        .classed('link', true)
        .attr('x1', d => d.source.x + 50)
        .attr('y1', d => d.source.y + 50)
        .attr('x2', d => d.target.x + 50)
        .attr('y2', d => d.target.y + 50);

    // Nodes
    const node = svg.selectAll('.node')
        .data(hierarchyData.descendants())
        .enter()
        .append('g')
        .classed('node', true)
        .attr('transform', d => `translate(${d.x},${d.y})`);

    node.append('rect')
        .attr('width', 100)
        .attr('height', 30)
        .attr('x', -50)
        .attr('y', -15)
        .attr('rx', 5)
        .attr('ry', 5);

    node.append('text')
        .text(d => d.data.Voornaam + ' ' + d.data.Achternaam)
        .attr('dy', 4);
}

// Upload event
document.getElementById('upload').addEventListener('change', function(e){
    const file = e.target.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(evt){
            const people = parseCSV(evt.target.result);
            const root = buildTree(people);
            drawTree(root);
        };
        reader.readAsText(file);
    }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Mijn Website - Stamboom</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1, h2 { color: #333; }
        ul { list-style-type: none; }
        li { margin: 5px 0; }
        .person { margin-left: 20px; }
    </style>
</head>
<body>
    <h1>Welkom op mijn website</h1>
    <p>Dit is mijn eerste GitHub website met CSV stamboom visualisatie.</p>

    <h2>CSV Upload</h2>
    <input type="file" id="csvFile" accept=".csv">
    <button onclick="handleFile()">Upload CSV</button>

    <h2>Visualisatie</h2>
    <div id="output"></div>

    <script>
        function handleFile() {
            const fileInput = document.getElementById('csvFile');
            const file = fileInput.files[0];
            if (!file) {
                alert("Selecteer eerst een CSV-bestand!");
                return;
            }

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const data = results.data;
                    const idMap = {};
                    data.forEach(row => { idMap[row.ID] = row; });

                    // functie om kinderen van een persoon te vinden
                    function getChildren(parentID) {
                        return data.filter(r => r.VaderID === parentID || r.MoederID === parentID);
                    }

                    // bouw boom HTML
                    function buildTreeHTML(person) {
                        let html = `<li>${person.Voornaam} ${person.Achternaam} (${person.Geslacht})`;
                        const children = getChildren(person.ID);
                        if (children.length > 0) {
                            html += "<ul>";
                            children.forEach(child => { html += buildTreeHTML(child); });
                            html += "</ul>";
                        }
                        html += "</li>";
                        return html;
                    }

                    // begin bij root-personen (zonder vader & moeder)
                    let outputHtml = "<ul>";
                    data.forEach(person => {
                        if (!person.VaderID && !person.MoederID) {
                            outputHtml += buildTreeHTML(person);
                        }
                    });
                    outputHtml += "</ul>";

                    document.getElementById('output').innerHTML = outputHtml;
                }
            });
        }
    </script>
</body>
</html>

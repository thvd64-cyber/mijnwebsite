<!-- ======================= home/about.html v2.0.1 =======================
     Over-pagina: tijdelijk niet beschikbaar, consistente opmaak
     Wijziging v2.0.0: facelift — Navbar + TopBar + 'komt binnenkort' blok,
     geen aparte header meer, script.js verwijderd
     v2.0.1 login scrips
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFamTreeCollab - Over</title>
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* ======================= BINNENKORT BLOK ======================= */
        .binnenkort-blok {                                                 /* Centraal informatieblok */
            max-width: 520px;                                              /* Niet te breed */
            margin: 0 auto;                                                /* Horizontaal centreren */
            text-align: center;                                            /* Tekst centreren */
            padding: 48px 24px;                                            /* Ruimte rondom de inhoud */
        }
        .binnenkort-blok .icoon {                                         /* Groot icoon boven de tekst */
            font-size: 3rem;                                               /* Groot genoeg om op te vallen */
            margin-bottom: 16px;                                           /* Ruimte onder het icoon */
        }
        .binnenkort-blok h1 {                                             /* Primaire titel */
            font-size: 1.4rem;                                             /* Groter dan de broodtekst */
            font-weight: bold;                                             /* Vetgedrukt */
            margin: 0 0 12px 0;                                            /* Ruimte onder de titel */
            color: #222;                                                   /* Bijna zwart */
        }
        .binnenkort-blok p {                                              /* Uitlegtekst */
            font-size: 0.95rem;                                            /* Leesbaar */
            color: #555;                                                   /* Middengrijs */
            line-height: 1.6;                                              /* Ruime regelafstand */
            margin: 0 0 24px 0;                                            /* Ruimte onder de tekst */
        }
        .knop-home {                                                       /* Knop terug naar home */
            display: inline-block;                                         /* Inline zodat het niet de volle breedte inneemt */
            padding: 10px 24px;                                            /* Ruim klikgebied */
            background: #1E90FF;                                           /* Blauw */
            color: #fff;                                                   /* Witte tekst */
            text-decoration: none;                                         /* Geen onderstreping */
            border-radius: 5px;                                            /* Afgeronde hoeken */
            font-size: 0.95rem;                                            /* Leesbaar */
            font-weight: bold;                                             /* Vetgedrukt */
        }
        .knop-home:hover { background: #1278d4; }                         /* Donkerder bij hover */
    </style>
</head>
<body>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/TopBar.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('topbar-placeholder').innerHTML = data);
</script>

<!-- ======================= Navbar ======================= -->
<div id="Navbar-placeholder"></div>
     
<!-- Scripts: Supabase + auth ALTIJD vóór topbar.js -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/utils.js"></script>
<script src="/js/auth.js"></script>
     
<script>
fetch('/MyFamTreeCollab/Layout/Navbar.html')
    .then(resp => resp.text())
    .then(data => {
        const placeholder = document.getElementById('Navbar-placeholder');
        if (placeholder) placeholder.innerHTML = data;
    });
</script>

<!-- ======================= Hoofd content ======================= -->
<main>
    <div class="binnenkort-blok">
        <div class="icoon">🌳</div>                                        <!-- Decoratief icoon passend bij de stamboom-app -->
        <h1>Over MyFamTreeCollab</h1>
        <p>
            Deze pagina is momenteel in ontwikkeling.<br>
            Binnenkort vind je hier meer informatie over het project,
            de makers en hoe de app werkt.
        </p>
        <a href="/MyFamTreeCollab/" class="knop-home">Terug naar Home</a> <!-- Link terug naar de homepagina -->
    </div>
</main>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Footer.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('footer-placeholder').innerHTML = data);
</script>

</body>
</html>

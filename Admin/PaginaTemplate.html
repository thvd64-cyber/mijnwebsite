<!-- ======================= Admin/PaginaTemplate.html v1.0.0 ======================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8"> <!-- Tekencodering UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsief op mobiel/tablet/desktop -->
    <title>MyFamTreeCollab - [PAGINA NAAM]</title> <!-- Browser tab titel -->
    <link rel="stylesheet" href="../css/style.css"> <!-- Verbindt de externe CSS voor volledige styling -->
</head>
<body>
<!-- ======================= layout/TopBar.html ======================= -->
<div id="topbar-placeholder"></div>  <!-- container voor TopBar content -->
<script>
fetch('/MyFamTreeCollab/Layout/TopBar.html')  // Haalt TopBar HTML op
    .then(resp => resp.text())                // lees de inhoud van het bestand Converteert response naar tekst
    .then(data => {                           // werk met de opgehaalde HTML data
        document.getElementById('topbar-placeholder').innerHTML = data;  // plaats de TopBar HTML in de placeholder
    });
</script>
<!-- ======================= layout/Navbar.html ======================= -->
<div id="Navbar-placeholder"></div> <!-- plek waar Navbar komt -->
<script>
fetch('/MyFamTreeCollab/Layout/Navbar.html') // Navbar bestand ophalen
    .then(resp => resp.text())               // omzetten naar HTML tekst
    .then(data => {
        const placeholder = document.getElementById('Navbar-placeholder'); // placeholder ophalen
        if (placeholder) {                   // controleren of element bestaat
            placeholder.innerHTML = data;    // Navbar injecteren
        } else {
            console.error('Navbar-placeholder niet gevonden'); // Debugmelding
        }
    });
</script>

<!-- ======================= Pagina Titel Manueel ======================= -->
<div id="pageTitle" style="font-size:1.5rem; font-weight:bold; margin-bottom:15px;"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const pageTitleDiv = document.getElementById('pageTitle');  // Doel div
    const title = "Pagina Template ";            // ⚠️ Zelf invullen title
    pageTitleDiv.textContent = title
        .replace(/[-_]/g,' ')          // underscore/koppelteken → spatie
        .replace(/\b\w/g, c => c.toUpperCase()); // eerste letter hoofdletter
});
</script>

<!-- ======================= MAIN CONTENT ======================= -->
<section style="margin:20px; padding:20px; background:#ffffff; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.05);">
    <h2>Welkom</h2>
    <p>Dit is een herbruikbaar pagina template voor MyFamTreeCollab.</p>
</section>

<!-- ======================= UNDER CONSTRUCTION ======================= -->
<div class="under-construction" style="text-align:center; padding:40px; background:#fff3cd; border:1px solid #ffeeba; border-radius:8px; margin:20px;">
    <h2>⚠️ Under Construction</h2>
    <p>Deze pagina is nog in ontwikkeling.</p>
</div>

<!-- ======================= FOOTER ======================= -->
<div id="footer-placeholder"></div> <!-- Placeholder voor Footer -->

<!-- ======================= SCRIPT: LAYOUT LOADER ======================= -->
<script>
/* ======================= GENERIC LAYOUT LOADER ======================= */
function loadHTML(targetId, filePath) {
    // Controleer of placeholder bestaat
    const el = document.getElementById(targetId); // Haal element op
    if (!el) {
        console.error(`❌ Element #${targetId} niet gevonden`); // Debug melding
        return; // Stop functie
    }

    // Fetch HTML bestand
    fetch(filePath)
        .then(response => {
            if (!response.ok) { // Controleer HTTP status
                throw new Error(`HTTP ${response.status} - ${filePath}`); // Gooi fout
            }
            return response.text(); // Zet om naar tekst
        })
        .then(data => {
            el.innerHTML = data; // Inject HTML in placeholder
        })
        .catch(err => {
            console.error(`❌ Fout bij laden van ${filePath}:`, err); // Fout loggen
            el.innerHTML = `<p style="color:red;">Fout bij laden van component</p>`; // Fallback UI
        });
}
</script>

<!-- ======================= SCRIPT: INIT LOAD ======================= -->
<script>
document.addEventListener('DOMContentLoaded', () => {

    /* ======================= LOAD LAYOUT COMPONENTS ======================= */
    loadHTML('topbar-placeholder', '../layout/TopBar.html'); // TopBar laden
    loadHTML('navbar-placeholder', '../layout/Navbar.html'); // Navbar laden
    loadHTML('footer-placeholder', '../layout/Footer.html'); // Footer laden

    /* ======================= PAGINA TITEL AUTOMATISCH ======================= */
    const pageTitleDiv = document.getElementById('pageTitle'); // Doel element

    let path = window.location.pathname.split("/").pop(); // Pak bestandsnaam
    let title = path.replace('.html',''); // Verwijder extensie

    title = title
        .replace(/[-_]/g,' ') // underscores → spaties
        .replace(/\b\w/g, c => c.toUpperCase()); // eerste letters hoofdletter

    pageTitleDiv.textContent = title; // Zet titel in DOM
});
</script>

</body>
</html>

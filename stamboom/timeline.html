<!-- ======================= stamboom/timeline.html v2.1.0 =======================
     Tijdlijnpagina: visualiseert personen op een horizontale tijdas via HTML5 Canvas
     Wijziging v2.1.0: canvas-rendering vervangen DOM-nodes, container aangepast,
                       tooltip-overlay toegevoegd, welkomstblok behouden
     Scripts: utils.js → schema.js → storage.js → LiveSearch.js → relatieEngine.js → timeline.js
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFamTreeCollab - Tijdlijn</title>
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/timeline.css">
    <style>
        /* ======================= WELKOMSTBLOK ======================= */
        .welkom-blok { margin-bottom: 20px; }
        .welkom-blok h1 { font-size: 1.4rem; font-weight: bold; margin: 0 0 8px 0; color: #222; }
        .welkom-blok p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0; }

        /* ======================= ZOEKBALK ======================= */
        .zoek-sectie { margin-bottom: 20px; }                             /* Ruimte onder de zoeksectie */
        #sandboxSearch {                                                   /* Zoekveld voor persoon selectie */
            width: 50%;                                                    /* Halve paginabreedte */
            padding: 9px 12px;                                             /* Ruim klikgebied */
            font-size: 1rem;                                               /* Leesbare tekstgrootte */
            border: 1px solid #bbb;                                        /* Subtiele rand */
            border-radius: 5px;                                            /* Afgeronde hoeken */
            box-sizing: border-box;                                        /* Padding telt mee in breedte */
        }
        #sandboxSearch:focus {                                             /* Focusstijl */
            outline: none;
            border-color: #1E90FF;                                         /* Blauwe rand bij focus */
        }

        /* ======================= TIJDLIJN CONTAINER ======================= */
        #timelineContainer {                                               /* Wrapper voor canvas + tooltip */
            position: relative;                                            /* Anker voor absoluut gepositioneerde tooltip */
            overflow-x: auto;                                              /* Horizontaal scrollen als canvas breed is */
            border: 1px solid #ddd;                                        /* Subtiele rand */
            border-radius: 6px;                                            /* Afgeronde hoeken */
            background: #fafafa;                                           /* Lichtgrijze achtergrond */
            min-height: 120px;                                             /* Minimale hoogte zodat container zichtbaar is */
        }

        /* ======================= CANVAS ======================= */
        #timelineCanvas {                                                  /* Het canvas waarop timeline.js tekent */
            display: block;                                                /* Geen inline witruimte onder canvas */
            cursor: default;                                               /* Standaard cursor; timeline.js wisselt naar pointer op hover */
        }

        /* ======================= PLACEHOLDER TEKST ======================= */
        #timelinePlaceholder {                                             /* Melding wanneer nog geen persoon gekozen is */
            padding: 40px 20px;                                            /* Ruim wit rondom tekst */
            text-align: center;                                            /* Gecentreerd */
            color: #999;                                                   /* Gedempte kleur */
            font-size: 0.95rem;                                            /* Zelfde als welkomst p */
        }

        /* ======================= TOOLTIP ======================= */
        #timelineTooltip {                                                 /* Hover-tooltip getekend door timeline.js */
            position: absolute;                                            /* Zweeft boven canvas */
            pointer-events: none;                                          /* Tooltip vangt geen muisevents op */
            background: rgba(30, 30, 30, 0.92);                           /* Donkere achtergrond */
            color: #fff;                                                   /* Witte tekst */
            font-size: 0.82rem;                                            /* Klein maar leesbaar */
            line-height: 1.5;                                              /* Ruime regelafstand */
            padding: 8px 12px;                                             /* Ruimte rondom tekst */
            border-radius: 5px;                                            /* Afgeronde hoeken */
            white-space: pre-line;                                         /* Regeleinden in tooltip-tekst respecteren */
            max-width: 240px;                                              /* Maximale breedte om overflow te voorkomen */
            display: none;                                                 /* Standaard verborgen; timeline.js toont/verbergt */
            z-index: 100;                                                  /* Boven alle andere content */
        }
    </style>
</head>
<body>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/TopBar.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('topbar-placeholder').innerHTML = data);
</script>

<!-- ======================= Navbar ======================= -->
<div id="Navbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Navbar.html')
    .then(resp => resp.text())
    .then(data => {
        const ph = document.getElementById('Navbar-placeholder');
        if (ph) ph.innerHTML = data;
    });
</script>

<!-- ======================= Hoofd content ======================= -->
<main>
    <div class="container">

        <!-- ======================= Welkomstblok ======================= -->
        <div class="welkom-blok">
            <h1>Welkom bij je stamboom Tijdlijn</h1>
            <p>
                Zoek een persoon op om de tijdlijn van zijn of haar familie te bekijken.
                Elke persoon wordt weergegeven als een horizontale balk van geboorte tot overlijden,
                gegroepeerd per generatie.
            </p>
        </div>

        <!-- ======================= Zoekbalk ======================= -->
        <div class="zoek-sectie">
            <input type="text" id="sandboxSearch" placeholder="Zoek op naam, ID of geboortedatum..."> <!-- Zoekveld gekoppeld aan LiveSearch + timeline.js -->
        </div>

        <!-- ======================= Tijdlijn container ======================= -->
        <div id="timelineContainer">

            <!-- Placeholder: zichtbaar zolang geen persoon geselecteerd is -->
            <div id="timelinePlaceholder">Zoek een persoon om de tijdlijn te laden.</div>

            <!-- Canvas: timeline.js tekent hier de balkjes, tijdas en verbindingslijnen -->
            <!-- Breedte en hoogte worden dynamisch ingesteld door timeline.js -->
            <canvas id="timelineCanvas" style="display: none;"></canvas>

            <!-- Tooltip: wordt door timeline.js gepositioneerd en gevuld op hover -->
            <div id="timelineTooltip"></div>

        </div>

    </div>
</main>

<!-- ======================= Scripts (volgorde verplicht) ======================= -->
<script src="../js/utils.js"></script>      <!-- 1e: hulpfuncties (ftSafe, ftFormatDate, ftParseBirthday) -->
<script src="../js/schema.js"></script>     <!-- 2e: veldnamen en CSV-definitie -->
<script src="../js/storage.js"></script>    <!-- 3e: localStorage API -->
<script src="../js/LiveSearch.js"></script> <!-- 4e: live zoekfunctie -->
<script src="../js/relatieEngine.js"></script> <!-- 5e: familierelaties berekenen -->
<script src="../js/timeline.js"></script>   <!-- 6e (laatste): canvas rendering en interactie -->

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Footer.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('footer-placeholder').innerHTML = data);
</script>

</body>
</html>

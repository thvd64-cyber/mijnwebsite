<!-- ======================= stamboom/timeline.html v2.0.0 =======================
     Tijdlijnpagina: visualiseert personen op een horizontale tijdas
     Wijziging v1.0.0: facelift — welkomstblok, inline stijlen naar <style>,
                       uitgecommentarieerde paginatitel opgeruimd
     Scripts: utils.js → schema.js → storage.js → LiveSearch.js → relatieEngine.js → timeline.js
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFamTreeCollab - Tijdlijn</title>
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/timeline.css">
    <style>
        /* ======================= WELKOMSTBLOK ======================= */
        .welkom-blok { margin-bottom: 20px; }
        .welkom-blok h1 { font-size: 1.4rem; font-weight: bold; margin: 0 0 8px 0; color: #222; }
        .welkom-blok p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0; }

        /* ======================= ZOEKBALK ======================= */
        .zoek-sectie { margin-bottom: 20px; }                             /* Ruimte onder de zoeksectie */
        #sandboxSearch {                                                   /* Zoekveld voor persoon selectie */
            width: 50%;                                                    /* Halve paginabreedte */
            padding: 9px 12px;                                             /* Ruim klikgebied */
            font-size: 1rem;                                               /* Leesbare tekstgrootte */
            border: 1px solid #bbb;                                        /* Subtiele rand */
            border-radius: 5px;                                            /* Afgeronde hoeken */
            box-sizing: border-box;                                        /* Padding telt mee in breedte */
        }
        #sandboxSearch:focus {                                             /* Focusstijl */
            outline: none;
            border-color: #1E90FF;                                         /* Blauwe rand bij focus */
        }

        /* ======================= TIJDLIJN CONTAINER ======================= */
        #timelineContainer {                                               /* Wrapper voor de tijdlijn visualisatie */
            overflow-x: auto;                                              /* Horizontaal scrollen als de tijdlijn breed is */
            border: 1px solid #ddd;                                        /* Subtiele rand */
            border-radius: 6px;                                            /* Afgeronde hoeken */
            padding: 20px;                                                 /* Ruimte binnen het kader */
            background: #fafafa;                                           /* Lichtgrijze achtergrond */
            min-height: 120px;                                             /* Minimale hoogte zodat de container zichtbaar is */
        }
    </style>
</head>
<body>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/TopBar.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('topbar-placeholder').innerHTML = data);
</script>

<!-- ======================= Navbar ======================= -->
<div id="Navbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Navbar.html')
    .then(resp => resp.text())
    .then(data => {
        const ph = document.getElementById('Navbar-placeholder');
        if (ph) ph.innerHTML = data;
    });
</script>

<!-- ======================= Hoofd content ======================= -->
<main>
    <div class="container">

        <!-- ======================= Welkomstblok ======================= -->
        <div class="welkom-blok">
            <h1>Welkom bij Tijdlijn</h1>
            <p>
                Zoek een persoon op om de tijdlijn van zijn of haar familie te bekijken.
                Personen worden geplaatst op basis van geboortedatum, gegroepeerd per generatie.
            </p>
        </div>

        <!-- ======================= Zoekbalk ======================= -->
        <div class="zoek-sectie">
            <input type="text" id="sandboxSearch" placeholder="Zoek op naam, ID of geboortedatum..."> <!-- Zoekveld gekoppeld aan timeline.js -->
        </div>

        <!-- ======================= Tijdlijn (gevuld door timeline.js) ======================= -->
        <div id="timelineContainer"></div>                                <!-- timeline.js rendert hier de tijdlijn nodes -->

    </div>
</main>

<!-- ======================= Scripts (volgorde verplicht) ======================= -->
<script src="../js/utils.js"></script>
<script src="../js/schema.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/LiveSearch.js"></script>
<script src="../js/relatieEngine.js"></script>
<script src="../js/timeline.js"></script>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Footer.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('footer-placeholder').innerHTML = data);
</script>

</body>
</html>

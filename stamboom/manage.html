<!-- ======================= stamboom/manage.html v1.3.20 ======================= -->
<!-- LiveSearch.js integration and residual code cleaning -->
<!DOCTYPE html>
<html lang="nl"> <!-- Document taal: Nederlands -->

<head>
<meta charset="UTF-8"> <!-- Tekencodering UTF-8 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Mobiel responsive -->
<title>MyFamTreeCollab - Manage</title> <!-- Pagina titel in browser -->

<!-- ======================= CSS ======================= -->
<link rel="stylesheet" href="../css/style.css"> <!-- Algemene project stylesheet -->

<!-- ======================= PAGINA SPECIFIEKE STIJL ======================= -->
<style>
/* ======================= BASIS STIJL ======================= */
body{
    font-family:Arial,sans-serif; /* standaard font */
    margin:20px; /* ruimte rondom pagina */
    background-color: transparent; /* transparant */
    color:#333; /* standaard tekstkleur */
}

/* ======================= TABEL BASIS ======================= */
#manageTable{
    width:100%; /* tabel vult volledige breedte */
    border-collapse:collapse; /* borders samensmelten */
    margin-top:20px; /* marge boven tabel */
    background-color:transparent;
}

th,td{
    border:1px solid #ccc; /* dunne rand */
    padding:6px;
    text-align:left;
    vertical-align:top;
}

th{
    background-color: transparent;
}

/* ======================= TEXTAREA CELLEN ======================= */
#manageTable td textarea{
    background-color:transparent;
    border:none;
    width:100%;
    box-sizing:border-box;
    cursor:text;
    resize:vertical;
    font-family:inherit;
    font-size:1rem;
    padding:4px;
}

/* ======================= RELATIE KLEUREN ======================= */
.HoofdID { background: #fffde7; font-weight:600; }
.VHoofdID, .MHoofdID { background: #e8f5e9; font-weight:500; }
.PHoofdID { background: #f3e5f5; font-style:italic; }
.KindID { background: #e3f2fd; }
.HKindID { background: #eef7fe; }
.PHKindID { background: #f7fbff; }
.KPartnerID { background: #d0ebff; font-style:italic; }
.BZID { background: #fff3e0; font-weight:500; }
.BZPartnerID { background: #fbe9e7; font-style:italic; }

/* ======================= CONTROLS ======================= */
#searchPerson{
    width:calc(100% - 40px); /* breedte minus marge */
    margin:0 20px;
    height:50px;
    font-size:1.4rem;
    padding:8px 12px;
    border:1px solid #999;
    border-radius:5px;
    box-sizing:border-box;
}

/* ======================= KNOPPEN ======================= */
button{
    height:45px;
    font-size:1.2rem;
    padding:0 20px;
    border-radius:5px;
    cursor:pointer;
    margin-right:10px;
}
</style>
</head>

<body>

<!-- ======================= TOPBAR ======================= -->
<div id="topbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/TopBar.html')
.then(resp=>resp.text())
.then(data=>document.getElementById('topbar-placeholder').innerHTML=data);
</script>

<!-- ======================= NAVBAR ======================= -->
<div id="Navbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Navbar.html')
.then(resp=>resp.text())
.then(data=>{
    const ph=document.getElementById('Navbar-placeholder');
    if(ph) ph.innerHTML=data;
});
</script>

<!-- ======================= PAGINA TITEL ======================= -->
<div id="pageTitle" style="font-size:1.5rem;font-weight:bold;margin-bottom:15px;">
Manage Stamboom
</div>

<!-- ======================= MAIN CONTENT ======================= -->
<main>
<div class="container">

<!-- ======================= LIVE SEARCH + HELPERS ======================= -->
<input type="text" id="searchPerson" placeholder="Voer ID of naam in" />

<script>
function safe(val){ return val ? String(val).trim() : ''; }
</script>

<!-- ======================= BUTTONS ======================= -->
<div style="margin-top:10px;margin-bottom:20px;">
    <button id="refreshBtn">🔄 Refresh</button>
    <button id="addBtn">+ Toevoegen</button>
    <button id="saveBtn">💾 Opslaan</button>
</div>

<!-- ======================= MANAGE TABLE ======================= -->
<table id="manageTable">
<thead><tr></tr></thead>
<tbody></tbody>
</table>

</div>
</main>


<!-- ======================= PROJECT SCRIPTS ======================= -->
<script src="../js/utils.js"></script>          <!-- centrale hulpfuncties: safe, formatDate, parseBirthday -->
<script src="../js/schema.js"></script>           <!-- definieert kolom structuur -->
<script src="../js/idGenerator.js"></script>     <!-- genereert ID bij nieuwe persoon -->
<script src="../js/storage.js"></script>          <!-- opslag/fetch van dataset -->
<script src="../js/LiveSearch.js"></script>       <!-- centrale Live Search module -->
<script src="../js/relatieEngine.js"></script>  <!-- centrale relatie-berekening -->
<script src="../js/manage.js"></script>          <!-- tabel render, add/save/refresh etc -->

<!-- ======================= FOOTER ======================= -->
<div id="footer-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Footer.html')
.then(resp=>resp.text())
.then(data=>document.getElementById('footer-placeholder').innerHTML=data);
</script>

</body>
</html>

<!-- ======================= stamboom/manage.html v2.2.2 =======================
     Beheerpagina: stamboom bewerken als tabel met live search

     Wijziging v2.3.0:
     - Horizontale scroll toegevoegd via wrapper (zelfde principe als template.html)
     - white-space: nowrap toegevoegd zodat tabel breedte behoudt (v2.2.1)
     - Geen impact op bestaande JS functionaliteit
     - v2.2.2 sticky header 

     Scripts: utils.js → schema.js → idGenerator.js → storage.js → LiveSearch.js
              → relatieEngine.js → manage.js (verplichte volgorde)
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8"> <!-- Tekenset -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive scaling -->
    <title>MyFamTreeCollab - Manage</title>

    <link rel="icon" href="../favicon.ico" type="image/x-icon"> <!-- Favicon -->
    <link rel="stylesheet" href="../css/style.css"> <!-- Algemene styles -->
    <link rel="stylesheet" href="../css/RelationColors.css"> <!-- Relatiekleuren -->

    <style>

        /* ======================= WELKOMSTBLOK ======================= */
        .welkom-blok { margin-bottom: 20px; } /* Ruimte onder blok */
        .welkom-blok h1 { font-size: 1.4rem; font-weight: bold; margin: 0 0 8px 0; color: #222; } /* Titel */
        .welkom-blok p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0; } /* Tekst */

        /* ======================= ZOEKBALK ======================= */
        .zoek-sectie { margin-bottom: 16px; } /* Ruimte onder zoek */
        #searchPerson {
            width: 50%; /* Halve breedte */
            padding: 9px 12px; /* Binnenruimte */
            font-size: 1rem; /* Tekstgrootte */
            border: 1px solid #bbb; /* Randkleur */
            border-radius: 5px; /* Hoeken afgerond */
            box-sizing: border-box; /* Inclusief padding in breedte */
        }
        #searchPerson:focus {
            outline: none; /* Geen focus outline */
            border-color: #1E90FF; /* Blauwe rand bij focus */
        }

        /* ======================= KNOPPEN ======================= */
        .knoppen-balk {
            display: flex; /* Flex layout */
            gap: 10px; /* Ruimte tussen knoppen */
            flex-wrap: wrap; /* Mobiel onder elkaar */
            margin-bottom: 16px; /* Ruimte onder knoppen */
        }
        .knoppen-balk button {
            padding: 9px 18px; /* Klikgebied */
            font-size: 0.95rem; /* Tekstgrootte */
            font-weight: bold; /* Vetgedrukt */
            border: none; /* Geen rand */
            border-radius: 5px; /* Hoeken afgerond */
            cursor: pointer; /* Handje bij hover */
        }
        #refreshBtn { background: #6c757d; color: #fff; } /* Grijs refresh */
        #refreshBtn:hover { background: #5a6268; } /* Donkerder grijs */

        #addBtn { background: #28a745; color: #fff; } /* Groen toevoegen */
        #addBtn:hover { background: #218838; } /* Donkerder groen */

        #saveBtn { background: #1E90FF; color: #fff; } /* Blauw opslaan */
        #saveBtn:hover { background: #1278d4; } /* Donkerder blauw */

        /* ======================= SCROLL WRAPPER ======================= */
        .manage-tabel-wrapper {
            overflow-x: auto; /* Horizontale scroll */
            margin-bottom: 16px; /* Ruimte onder tabel */
        }

        /* ======================= TABEL ======================= */
        #manageTable {
            width: 100%; /* Volledige breedte */
            border-collapse: collapse; /* Geen dubbele randen */
            margin-top: 4px; /* Ruimte boven tabel */
            background: transparent; /* Transparante achtergrond */
            white-space: nowrap; /* Forceer scroll, geen wrapping */
        }

        th, td {
            border: 1px solid #ddd; /* Randkleur */
            padding: 6px 8px; /* Binnenruimte */
            text-align: left; /* Links uitlijnen */
            vertical-align: top; /* Verticale uitlijning */
            font-size: 0.9rem; /* Tekstgrootte */
        }

        th {
            font-weight: bold; /* Vet */
            color: #333; /* Tekstkleur */
        }

        /* ======================= STICKY HEADER ======================= */
        #manageTable thead th {
            position: sticky;        /* Blijft plakken bij scroll */
            top: 0;                  /* Vast aan bovenkant wrapper */
            background: inherit;     /* Houd relation colors of default zichtbaar */
            z-index: 3;              /* Boven cellen */
        }

        /* ======================= STICKY FIRST COLUMN ======================= */
        #manageTable th:first-child,
        #manageTable td:first-child {
            position: sticky;        /* Blijft staan bij horizontale scroll */
            left: 0;                 /* Vast links */
            background: inherit;     /* Relation colors blijven zichtbaar */
            z-index: 2;              /* Onder header, boven andere cellen */
        }

        /* ======================= HOEK CEL HEADER + EERSTE KOL ======================= */
        #manageTable thead th:first-child {
            z-index: 4;              /* Hoogste laag zodat hoek correct blijft */
            background: inherit;     /* Houd kleuren zichtbaar */
        }

        /* ======================= TEXTAREA ======================= */
        #manageTable td textarea {
            background: transparent; /* Geen extra achtergrond */
            border: none; /* Geen rand */
            width: 100%; /* Volledige celbreedte */
            box-sizing: border-box; /* Inclusief padding */
            resize: vertical; /* Alleen verticaal resize */
            font-family: inherit; /* Zelfde lettertype */
            font-size: 0.9rem; /* Tekstgrootte */
            padding: 2px 4px; /* Binnenruimte */
        }

        /* ======================= RELATIE KLEUREN ======================= */
        tr.HoofdID td { background: var(--color-hoofd); font-weight: 500; } /* HoofdID kleur */
        tr.VHoofdID td,
        tr.MHoofdID td { background: var(--color-vader); } /* Vader/Moeder kleur */
        tr.PHoofdID td { background: var(--color-partner-hoofd); font-style: italic; } /* Partner HoofdID */
        tr.KindID td { background: var(--color-KindID); opacity: 0.85; } /* KindID */
        tr.HKindID td { background: var(--color-HKindID); } /* HKindID */
        tr.PHKindID td { background: var(--color-PHKindID); } /* PHKindID */
        tr.Partner td { background: var(--color-partner); font-style: italic; } /* Partner */
        tr.BZID td { background: var(--color-bz); } /* BZID */

    </style>
</head>

<body>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/TopBar.html') // Haal TopBar HTML op
    .then(resp => resp.text()) // Zet response om naar tekst
    .then(data => document.getElementById('topbar-placeholder').innerHTML = data); // Injecteer in DOM
</script>

<!-- ======================= Navbar ======================= -->
<div id="Navbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Navbar.html')
    .then(resp => resp.text()) // Haal navbar op
    .then(data => { 
        const ph = document.getElementById('Navbar-placeholder'); // Zoek placeholder
        if (ph) ph.innerHTML = data; // Plaats navbar
    });
</script>

<!-- ======================= MAIN ======================= -->
<main>
    <div class="container">

        <!-- ======================= WELKOM ======================= -->
        <div class="welkom-blok">
            <h1>Welkom bij je stamboom Manager</h1>
            <p>Zoek een persoon op om de stamboom te beheren.</p>
        </div>

        <!-- ======================= ZOEK ======================= -->
        <div class="zoek-sectie">
            <input type="text" id="searchPerson" placeholder="Zoek op ID, naam of geboortedatum...">
        </div>

        <!-- ======================= KNOPPEN ======================= -->
        <div class="knoppen-balk">
            <button id="refreshBtn">Vernieuwen</button>
            <button id="addBtn">+ Toevoegen</button>
            <button id="saveBtn">Opslaan</button>
        </div>

        <!-- ======================= TABEL MET WRAPPER ======================= -->
        <div class="manage-tabel-wrapper"> <!-- Scroll container -->
            <table id="manageTable">
                <thead><tr></tr></thead>
                <tbody></tbody>
            </table>
        </div>

    </div>
</main>

<!-- ======================= SCRIPTS ======================= -->
<script src="../js/utils.js"></script>
<script src="../js/schema.js"></script>
<script src="../js/idGenerator.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/LiveSearch.js"></script>
<script src="../js/relatieEngine.js"></script>
<script src="../js/manage.js"></script>

<!-- ======================= FOOTER ======================= -->
<div id="footer-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Footer.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('footer-placeholder').innerHTML = data);
</script>

</body>
</html>

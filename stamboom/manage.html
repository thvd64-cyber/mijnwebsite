<!-- ======================= stamboom/manage.html v1.3.20 ======================= -->
<!-- LiveSearch.js integration and residual code cleaning -->

<!DOCTYPE html> <!-- HTML5 document type -->
<html lang="nl"> <!-- Document taal: Nederlands -->

<head>
<meta charset="UTF-8"> <!-- Tekencodering UTF-8 voor correcte weergave van speciale tekens -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Zorgt voor responsive gedrag op mobiel -->
<title>MyFamTreeCollab - Manage</title> <!-- Titel zichtbaar in browser tab -->

<!-- ======================= CSS ======================= -->
<link rel="stylesheet" href="../css/style.css"> <!-- Algemene stylesheet voor hele project -->

<!-- ======================= PAGINA SPECIFIEKE STIJL ======================= -->
<style>

/* ======================= BASIS STIJL ======================= */
body{
    font-family:Arial,sans-serif; /* Standaard font voor leesbaarheid */
    margin:20px; /* Witruimte rondom volledige pagina */
    background-color: transparent; /* Transparante achtergrond (neemt parent over) */
    color:#333; /* Donkergrijze tekstkleur voor betere leesbaarheid */
}

/* ======================= TABEL BASIS ======================= */
#manageTable{
    width:100%; /* Tabel vult volledige breedte van container */
    border-collapse:collapse; /* Zorgt dat borders samensmelten (geen dubbele lijnen) */
    margin-top:20px; /* Ruimte boven de tabel */
    background-color:transparent; /* Geen achtergrondkleur */
}

th,td{
    border:1px solid #ccc; /* Dunne grijze rand rondom cellen */
    padding:6px; /* Binnenruimte voor leesbaarheid */
    text-align:left; /* Tekst links uitlijnen */
    vertical-align:top; /* Content bovenaan cel uitlijnen */
}

th{
    background-color: transparent; /* Geen highlight voor headers (bewust clean design) */
}

/* ======================= TEXTAREA CELLEN ======================= */
#manageTable td textarea{
    background-color:transparent; /* Geen achtergrond → lijkt op gewone tekst */
    border:none; /* Geen input veld rand */
    width:100%; /* Volledige breedte van de tabelcel */
    box-sizing:border-box; /* Padding telt mee binnen breedte */
    cursor:text; /* Cursor verandert naar tekst invoer cursor */
    resize:vertical; /* Alleen verticaal vergroten/verkleinen toegestaan */
    font-family:inherit; /* Neemt font over van tabel/body */
    font-size:1rem; /* Standaard tekstgrootte */
    padding:4px; /* Kleine binnenruimte voor leesbaarheid */
}

/* ======================= RELATIE KLEUREN ======================= */
/* Visuele codering van familierollen in de tabel */
.HoofdID { background: #fffde7; font-weight:600; } /* Hoofd persoon (highlight) */
.VHoofdID, .MHoofdID { background: #e8f5e9; font-weight:500; } /* Ouders */
.PHoofdID { background: #f3e5f5; font-style:italic; } /* Partner hoofd */
.KindID { background: #e3f2fd; } /* Kind */
.HKindID { background: #eef7fe; } /* Hoofd-kind (extra nuance) */
.PHKindID { background: #f7fbff; } /* Partner van hoofd-kind */
.KPartnerID { background: #d0ebff; font-style:italic; } /* Partner van kind */
.BZID { background: #fff3e0; font-weight:500; } /* Bijzonder persoon */
.BZPartnerID { background: #fbe9e7; font-style:italic; } /* Partner van bijzonder */
 
/* ======================= CONTROLS ======================= */
#searchPerson{
    width:calc(100% - 40px); /* Volledige breedte minus linker/rechter marge */
    margin:0 20px; /* 20px links en rechts */
    height:50px; /* Groot invoerveld (UX focus) */
    font-size:1.4rem; /* Grote tekst voor snelle invoer */
    padding:8px 12px; /* Binnenruimte */
    border:1px solid #999; /* Zichtbare rand */
    border-radius:5px; /* Afgeronde hoeken */
    box-sizing:border-box; /* Padding binnen breedte houden */
}

/* ======================= KNOPPEN ======================= */
button{
    height:45px; /* Uniforme hoogte */
    font-size:1.2rem; /* Grotere tekst voor usability */
    padding:0 20px; /* Horizontale ruimte */
    border-radius:5px; /* Afgeronde knoppen */
    cursor:pointer; /* Hand cursor bij hover */
    margin-right:10px; /* Ruimte tussen knoppen */
}
</style>
</head>

<body>

<!-- ======================= TOPBAR ======================= -->
<div id="topbar-placeholder"></div> <!-- Placeholder waar TopBar geladen wordt -->
<script>
fetch('/MyFamTreeCollab/Layout/TopBar.html') // Haalt externe HTML op
.then(resp=>resp.text()) // Converteert response naar tekst
.then(data=>document.getElementById('topbar-placeholder').innerHTML=data); // Injecteert HTML in placeholder
</script>

<!-- ======================= NAVBAR ======================= -->
<div id="Navbar-placeholder"></div> <!-- Placeholder voor navigatie -->
<script>
fetch('/MyFamTreeCollab/Layout/Navbar.html') // Laadt navbar HTML
.then(resp=>resp.text()) // Zet response om naar tekst
.then(data=>{
    const ph=document.getElementById('Navbar-placeholder'); // Pak placeholder element
    if(ph) ph.innerHTML=data; // Alleen injecteren als element bestaat (defensief programmeren)
});
</script>

<!-- ======================= PAGINA TITEL ======================= -->
<div id="pageTitle" style="font-size:1.5rem;font-weight:bold;margin-bottom:15px;">
Manage Stamboom <!-- Titel zichtbaar boven content -->
</div>

<!-- ======================= MAIN CONTENT ======================= -->
<main>
<div class="container"> <!-- Layout container (mogelijk gebruikt in global CSS) -->

<!-- ======================= LIVE SEARCH + HELPERS ======================= -->
<input type="text" id="searchPerson" placeholder="Voer ID of naam in" /> <!-- Input veld voor live filtering -->

<script>
function safe(val){ return val ? String(val).trim() : ''; } // Helper: voorkomt null/undefined errors en trimt strings
</script>

<!-- ======================= BUTTONS ======================= -->
<div style="margin-top:10px;margin-bottom:20px;">
    <button id="refreshBtn">🔄 Refresh</button> <!-- Herlaadt dataset -->
    <button id="addBtn">+ Toevoegen</button> <!-- Voegt nieuwe persoon toe -->
    <button id="saveBtn">💾 Opslaan</button> <!-- Slaat wijzigingen op -->
</div>

<!-- ======================= MANAGE TABLE ======================= -->
<table id="manageTable">
<thead><tr></tr></thead> <!-- Wordt dynamisch gevuld via manage.js -->
<tbody></tbody> <!-- Hier komen de rijen -->
</table>

</div>
</main>

<!-- ======================= PROJECT SCRIPTS ======================= -->
<script src="../js/schema.js"></script>           <!-- Definieert kolommen/velden -->
<script src="../js/idGenerator.js"></script>     <!-- Genereert unieke ID's -->
<script src="../js/storage.js"></script>         <!-- Data opslag (localStorage / API) -->
<script src="../js/LiveSearch.js"></script>      <!-- Live filtering functionaliteit -->
<script src="../js/manage.js"></script>          <!-- Hoofdlogica: render, events, CRUD -->

<!-- ======================= FOOTER ======================= -->
<div id="footer-placeholder"></div> <!-- Placeholder voor footer -->
<script>
fetch('/MyFamTreeCollab/Layout/Footer.html') // Laadt footer HTML
.then(resp=>resp.text()) // Zet om naar tekst
.then(data=>document.getElementById('footer-placeholder').innerHTML=data); // Injecteert footer
</script>

</body>
</html>

<!-- ======================= stamboom/manage.html v1.2.6 ======================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8"> <!-- Tekencodering UTF-8 zodat alle tekens correct weergegeven worden -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Zorgt dat layout schaalbaar is voor mobiel/desktop -->
    <title>MyFamTreeCollab - Manage</title> <!-- Titel in browser tab -->
    <link rel="stylesheet" href="../css/style.css"> <!-- Algemene applicatie CSS -->

    <!-- ======================= RELATIE STYLING MANAGE TABLE ======================= -->
    <style>
        /* ====== Tabel transparant ====== */
#manageTable {
    background-color: transparent; /* Maakt de gehele tabel doorzichtig, zodat rijen kleuren zichtbaar zijn */
    border-collapse: collapse;     /* Zorgt dat celranden netjes samenvallen */
}
    /* ====== HoofdID ====== */
    .rel-hoofd { 
        background-color: #fffde7 !important; /* Licht geel, benadrukt de hoofdpersoon in stamboom */
        font-weight: 600;                     /* Bold font voor snelle herkenning */
    }
    /* Scenario override: alle cellen in hoofdrij krijgen ook geel */
    tr.rel-hoofd, tr.rel-hoofd td {
        background-color: #fffde7 !important; /* Forceert geel voor de hele rij */
        font-weight: 600;                     /* Zorgt dat bold blijft */
    }

    /* ====== Ouders ====== */
    .rel-vhoofdid, .rel-mhoofdid { 
        background-color: #e8f5e9 !important; /* Licht groen voor vader/moeder */
        font-weight: 500;                     /* Semi-bold voor onderscheid met hoofdID */
    }

    /* ====== Partner van Hoofd ====== */
    .rel-phoofdid { 
        background-color: #f3e5f5 !important; /* Licht paars/lavendel voor partner van hoofd */
        font-style: italic;                   /* Italic voor visueel onderscheid */
    }
    /* Scenario override: forceer kleur voor alle cellen van partner van hoofd */
    tr.rel-phoofdid, tr.rel-phoofdid td {
        background-color: #f3e5f5 !important; /* Forceert paars/lavendel */
        font-style: italic;                   /* Zorgt dat italic behouden blijft */
    }

    /* ====== Kinderen ====== */
    .rel-kindid { 
        background-color: #e3f2fd !important; /* Licht blauw standaard voor kind */
        font-weight: 400;                     /* Normaal font gewicht */
    }
    /* Scenario overrides Kinderen */
    .rel-kindid.scenario-1 { background-color: #e3f2fd !important; } /* Scenario 1 = standaard blauw */
    .rel-kindid.scenario-2 { background-color: #eef7fe !important; } /* Scenario 2 = iets lichter blauw */
    .rel-kindid.scenario-3 { background-color: #f7fbff !important; } /* Scenario 3 = zeer licht blauw */

    /* ====== Partner van Kind ====== */
    .rel-pkpartnerid { 
        background-color: #d0ebff !important; /* Iets donkerder blauw voor partner van kind */
        font-style: italic;                   /* Italic voor visueel onderscheid */
    }
    /* Scenario overrides Partner van Kind */
    .rel-pkpartnerid.scenario-1 { background-color: #d0ebff !important; } /* Scenario 1 = blauw */
    .rel-pkpartnerid.scenario-2 { background-color: #daf4ff !important; } /* Scenario 2 = lichter blauw */
    .rel-pkpartnerid.scenario-3 { background-color: #e4f9ff !important; } /* Scenario 3 = zeer licht blauw */

    /* ====== Broers/Zussen ====== */
    .rel-bzid { 
        background-color: #fff3e0 !important; /* Licht oranje voor broer/zus */
        font-weight: 500;                     /* Semi-bold */
    }
    /* Scenario overrides Broer/Zus */
    .rel-bzid.scenario-1 { background-color: #fff3e0 !important; } /* Scenario 1 = standaard oranje */
    .rel-bzid.scenario-2 { background-color: #fff7ed !important; } /* Scenario 2 = lichter */
    .rel-bzid.scenario-3 { background-color: #fffaf1 !important; } /* Scenario 3 = zeer licht */

    /* ====== Partner van Broer/Zus ====== */
    .rel-bzpartnerid { 
        background-color: #fbe9e7 !important; /* Iets donkerder oranje voor partner broer/zus */
        font-style: italic;                   /* Italic voor onderscheid */
    }
    /* Scenario overrides Partner Broer/Zus */
    .rel-bzpartnerid.scenario-1 { background-color: #fbe9e7 !important; }
    .rel-bzpartnerid.scenario-2 { background-color: #fcebe9 !important; }
    .rel-bzpartnerid.scenario-3 { background-color: #fdecea !important; }

    /* ====== Algemene input cel styling ====== */
    #manageTable td input { 
        background-color: transparent; /* Input achtergrond transparant zodat celkleur zichtbaar blijft */
        border: none;                  /* Geen borders voor cleaner look */
        width: 100%;                   /* Input vult volledige celbreedte */
        box-sizing: border-box;        /* Padding valt binnen breedte */
        cursor: text;                  /* Cursor verandert naar tekst bij hover */
    }

    /* ====== Hover effect rijen ====== */
    #manageTable tr:hover { 
        background-color: rgba(0,0,0,0.05); /* Lichte overlay bij hover om focus te tonen */
    }
    </style>
</head>
<body>
<!-- ======================= TopBar & Navbar ======================= -->
<div id="topbar-placeholder"></div> <!-- Topbar placeholder -->
<script>
fetch('/MyFamTreeCollab/Layout/TopBar.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('topbar-placeholder').innerHTML = data); // Voeg TopBar toe aan DOM
</script>

<div id="Navbar-placeholder"></div> <!-- Navbar placeholder -->
<script>
fetch('/MyFamTreeCollab/Layout/Navbar.html')
    .then(resp => resp.text())
    .then(data => {
        const placeholder = document.getElementById('Navbar-placeholder');
        if (placeholder) placeholder.innerHTML = data; // Voeg Navbar toe
        else console.error('Navbar-placeholder niet gevonden'); // Fallback
    });
</script>

<!-- ======================= Pagina Titel ======================= -->
<div id="pageTitle" style="font-size:1.5rem; font-weight:bold; margin-bottom:15px;"></div>
<script>
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('pageTitle').textContent = "Manage Stamboom"; // Zet titel bij DOM ready
});
</script>

<main>
<div class="container">
    <!-- Zoekveld en knoppen -->
    <input type="text" id="searchPerson" placeholder="Voer ID of naam in"> <!-- Live search veld -->
    <button id="refreshBtn">Refresh</button> <!-- Refresh tabel -->
    <button id="addBtn">+ Toevoegen</button> <!-- Voeg persoon toe -->
    <button id="saveBtn">Opslaan</button> <!-- Opslaan dataset -->

    <!-- Zoekresultaat Formulier -->
    <div id="searchResultForm" style="display:none; margin-top:15px; border:1px solid #ccc; padding:10px;">
        <h4>Gevonden personen:</h4>
        <form id="resultForm">
            <table id="resultTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Roepnaam</th>
                        <th>Achternaam</th>
                        <th>Geboortedatum</th>
                    </tr>
                </thead>
                <tbody></tbody> <!-- Resultaten via JS -->
            </table>
        </form>
    </div>

    <!-- Manage tabel -->
    <table id="manageTable">
        <thead><tr></tr></thead> <!-- Headers worden dynamisch door JS ingevuld -->
        <tbody></tbody> <!-- Rijen worden dynamisch door JS ingevuld -->
    </table>
</div>
</main>

<!-- ======================= Scripts ======================= -->
<script src="../js/schema.js"></script> <!-- Schema functies -->
<script src="../js/idGenerator.js"></script> <!-- ID generator -->
<script src="../js/storage.js"></script> <!-- Opslag functies -->
<script src="../js/manage.js"></script> <!-- Logica renderTable, relaties, CRUD -->

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Footer.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('footer-placeholder').innerHTML = data); // Footer in DOM plaatsen
</script>

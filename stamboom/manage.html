<!-- ======================= manage.html v1.3.16 ======================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Personen</title>
<style>
/* ======================= BASIS STIJL ======================= */
body{font-family:Arial,sans-serif;margin:20px;background:#f9f9f9;color:#333;}
table{width:100%;border-collapse:collapse;margin-bottom:20px;}
th,td{border:1px solid #ccc;padding:6px;text-align:left;vertical-align:top;}
th{background:#eee;}
textarea{font-family:inherit;font-size:1rem;padding:4px;}
.rel-hoofdid{background:#d1e7dd;}  /* HoofdID */
.rel-vhoofdid,.rel-mhoofdid{background:#f8d7da;} /* ouders */
.rel-phoofdid,.rel-kindpartnerid,.rel-bzpartnerid{background:#fff3cd;} /* partners */
.rel-kindid{background:#cff4fc;} /* kinderen */
.rel-bzid{background:#e2e3e5;} /* broers/zussen */

/* ======================= KNOPPEN ======================= */
button{margin-right:5px;padding:6px 12px;font-size:1rem;cursor:pointer;}
#searchPerson{padding:6px 8px;width:250px;font-size:1rem;}
</style>
</head>
<body>

<!-- ======================= HEADER ======================= -->
<h1>Manage Personen</h1>

<!-- ======================= CONTROLS ======================= -->
<input type="text" id="searchPerson" placeholder="Zoek persoon...">
<button id="addBtn">+ Voeg rij toe</button>
<button id="saveBtn">💾 Opslaan</button>
<button id="refreshBtn">🔄 Vernieuwen</button>

<!-- ======================= TABEL ======================= -->
<table id="manageTable">
    <thead>
        <tr></tr> <!-- Header wordt dynamisch gegenereerd via JS -->
    </thead>
    <tbody>
        <!-- Rijen worden dynamisch gerenderd via JS -->
    </tbody>
</table>

<!-- ======================= INCLUDE JS ======================= -->
<script src="manage.js"></script>
<!-- manage.js v1.3.15 drop-in bevat alle logica inclusief INIT, live search en storage -->

</body>
</html>

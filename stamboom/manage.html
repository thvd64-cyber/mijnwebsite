<!-- ======================= stamboom/manage.html v1.2.5 ======================= -->
<!-- partners grijs -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8"> <!-- Tekencodering UTF-8 zodat alle tekens correct weergegeven worden -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsief ontwerp voor mobiel/desktop -->
    <title>MyFamTreeCollab - Manage</title> <!-- Titel die in de browser tab verschijnt -->
    <link rel="stylesheet" href="../css/style.css"> <!-- Algemene CSS van de applicatie -->

<!-- ======================= RELATIE STYLING MANAGE TABLE (GRIJS UNIFORM) ======================= -->
<style>
/* ====== Hoofd ====== */
.rel-hoofd { 
    background-color: #fffde7 !important; /* Licht geel zodat het hoofd van de stamboom direct opvalt */
    font-weight: 600;                     /* Bold font voor snelle herkenning van hoofdID */
}

/* ====== Ouders ====== */
.rel-vhoofdid, .rel-mhoofdid { 
    background-color: #e8f5e9 !important; /* Licht groen voor ouders (vader/moeder) zodat ze duidelijk verschillen van hoofd */
    font-weight: 500;                     /* Semi-bold voor visueel verschil */
}

/* ====== Partner van Hoofd ====== */
.rel-phoofdid { 
    background-color: #e0e0e0 !important; /* Grijs voor partner van hoofd */
    font-style: italic;                   /* Italic zodat partner makkelijker te onderscheiden is */
}

/* ====== Kinderen ====== */
.rel-kindid { 
    background-color: #e0e0e0 !important; /* Grijs voor kinderen */
    font-weight: 400;                     /* Normaal font gewicht voor kinderen */
}

/* Scenario overrides Kind */
.rel-kindid.scenario-1 { background-color: #e0e0e0 !important; } /* Scenario 1 = grijs */
.rel-kindid.scenario-2 { background-color: #e0e0e0 !important; } /* Scenario 2 = grijs */
.rel-kindid.scenario-3 { background-color: #e0e0e0 !important; } /* Scenario 3 = grijs */

/* ====== Partner van Kind ====== */
.rel-pkpartnerid { 
    background-color: #e0e0e0 !important; /* Grijs voor partner van kind */
    font-style: italic;                   /* Italic blijft voor visueel onderscheid */
}

/* Scenario overrides Partner van Kind */
.rel-pkpartnerid.scenario-1 { background-color: #e0e0e0 !important; } /* Scenario 1 = grijs */
.rel-pkpartnerid.scenario-2 { background-color: #e0e0e0 !important; } /* Scenario 2 = grijs */
.rel-pkpartnerid.scenario-3 { background-color: #e0e0e0 !important; } /* Scenario 3 = grijs */

/* ====== Broers/Zussen ====== */
.rel-bzid { 
    background-color: #e0e0e0 !important; /* Grijs voor broer/zus */
    font-weight: 500;                     /* Semi-bold blijft voor herkenning */
}

/* Scenario overrides Broer/Zus */
.rel-bzid.scenario-1 { background-color: #e0e0e0 !important; } /* Scenario 1 = grijs */
.rel-bzid.scenario-2 { background-color: #e0e0e0 !important; } /* Scenario 2 = grijs */
.rel-bzid.scenario-3 { background-color: #e0e0e0 !important; } /* Scenario 3 = grijs */

/* ====== Partner van Broer/Zus ====== */
.rel-bzpartnerid { 
    background-color: #e0e0e0 !important; /* Grijs voor partner van broer/zus */
    font-style: italic;                   /* Italic voor visueel onderscheid */
}

/* Scenario overrides Partner Broer/Zus */
.rel-bzpartnerid.scenario-1 { background-color: #e0e0e0 !important; } /* Scenario 1 = grijs */
.rel-bzpartnerid.scenario-2 { background-color: #e0e0e0 !important; } /* Scenario 2 = grijs */
.rel-bzpartnerid.scenario-3 { background-color: #e0e0e0 !important; } /* Scenario 3 = grijs */

/* ====== Algemene input cel styling ====== */
#manageTable td input { 
    background-color: transparent; /* Input achtergrond transparant zodat celkleur zichtbaar blijft */
    border: none;                  /* Geen borders voor cleaner look */
    width: 100%;                   /* Input vult volledige celbreedte */
    box-sizing: border-box;        /* Padding valt binnen breedte */
    cursor: text;                  /* Cursor verandert naar tekst bij hover */
}
</style>    
    
    /* ====== Hover effect voor rijen ====== */
    #manageTable tr:hover { 
        background-color: rgba(0,0,0,0.05); /* Lichte grijze overlay bij hover om focus te tonen */
    }
    </style>
</head>
<body>

<!-- ======================= TopBar & Navbar ======================= -->
<div id="topbar-placeholder"></div> <!-- Placeholder voor topbar -->
<script>
fetch('/MyFamTreeCollab/Layout/TopBar.html') // TopBar inladen via fetch
  .then(resp => resp.text())
  .then(data => document.getElementById('topbar-placeholder').innerHTML = data); // Toevoegen aan DOM
</script>

<div id="Navbar-placeholder"></div> <!-- Placeholder voor Navbar -->
<script>
fetch('/MyFamTreeCollab/Layout/Navbar.html') // Navbar inladen
  .then(resp => resp.text())
  .then(data => {
      const placeholder = document.getElementById('Navbar-placeholder');
      if(placeholder) placeholder.innerHTML = data; // Voeg toe aan DOM
      else console.error('Navbar-placeholder niet gevonden'); // Fallback error
  });
</script>

<!-- ======================= Pagina Titel ======================= -->
<div id="pageTitle" style="font-size:1.5rem; font-weight:bold; margin-bottom:15px;"></div>
<script>
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('pageTitle').textContent = "Manage Stamboom"; // Zet titel bij DOM ready
});
</script>

<main>
<div class="container">
    <!-- Zoekveld en knoppen -->
    <input type="text" id="searchPerson" placeholder="Voer ID of naam in"> <!-- Live search veld -->
    <!-- <button id="loadBtn">Laad Persoon</button> --> <!-- verwijderd: Laad Persoon knop is overbodig door live search -->
    <button id="refreshBtn">Refresh</button> <!-- Refresh tabel -->
    <button id="addBtn">+ Toevoegen</button> <!-- Nieuwe persoon toevoegen -->
    <button id="saveBtn">Opslaan</button> <!-- Dataset opslaan -->

    <!-- Zoekresultaat Formulier -->
    <div id="searchResultForm" style="display:none; margin-top:15px; border:1px solid #ccc; padding:10px;">
        <h4>Gevonden personen:</h4>
        <form id="resultForm">
            <table id="resultTable">
                <thead>
                    <tr>
                        <th>ID</th> <!-- ID kolom -->
                        <th>Roepnaam</th> <!-- Roepnaam kolom -->
                        <th>Achternaam</th> <!-- Achternaam kolom -->
                        <th>Geboortedatum</th> <!-- Geboortedatum kolom -->
                    </tr>
                </thead>
                <tbody></tbody> <!-- Hier komen de resultaten via JS -->
            </table>
        </form>
    </div>

    <!-- Manage tabel -->
    <table id="manageTable">
        <thead><tr></tr></thead> <!-- Headers worden dynamisch door JS ingevuld -->
        <tbody></tbody> <!-- Rijen worden dynamisch door JS ingevuld -->
    </table>
</div>
</main>

<!-- ======================= Scripts ======================= -->
<script src="../js/schema.js"></script> <!-- Schema functies -->
<script src="../js/idGenerator.js"></script> <!-- Unieke ID generator -->
<script src="../js/storage.js"></script> <!-- Opslag functies -->
<script src="../js/manage.js"></script> <!-- Logica: renderTable, relaties, CRUD -->

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Footer.html')
  .then(resp => resp.text())
  .then(data => document.getElementById('footer-placeholder').innerHTML = data); // Footer in DOM plaatsen
</script>

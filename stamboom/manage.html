<!-- ======================= stamboom/manage.html v2.2.3 =======================
     Beheerpagina: stamboom bewerken als tabel met live search

     Wijziging v2.2.0:
     - Horizontale scroll toegevoegd via wrapper (zelfde principe als template.html)
     - white-space: nowrap toegevoegd zodat tabel breedte behoudt (v2.2.1)
     - Geen impact op bestaande JS functionaliteit
     - v2.2.2: login + Favicon / App-icoon
     - v2.2.3: bugfix — ontbrekende CSS-links toegevoegd (style.css, Tree.css,
               RelationColors.css), navbar placeholder ID mismatch opgelost
               (Navbar-placeholder → consistente schrijfwijze), dubbele utils.js
               import verwijderd.

     Scripts: utils.js → schema.js → idGenerator.js → storage.js → LiveSearch.js
              → relatieEngine.js → manage.js (verplichte volgorde)
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8"> <!-- Tekenset -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive scaling -->
    <title>Beheer</title>

    <!-- ===== Favicon / App-icoon ===== -->
    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/favicon-192x192.png">

    <!-- ===== Globale stijlen — volgorde is verplicht ===== -->
    <link rel="stylesheet" href="../css/style.css">           <!-- Basisstijlen + .container -->
    <link rel="stylesheet" href="../css/Tree.css">            <!-- Stamboom layout -->
    <link rel="stylesheet" href="../css/RelationColors.css">  <!-- CSS-variabelen voor relatiekleurencodes -->

    <style>
        /* ======================= WELKOMSTBLOK ======================= */
        .welkom-blok { margin-bottom: 20px; } /* Ruimte onder blok */
        .welkom-blok h1 { font-size: 1.4rem; font-weight: bold; margin: 0 0 8px 0; color: #222; }
        .welkom-blok p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0; }

        /* ======================= ZOEKBALK ======================= */
        .zoek-sectie { margin-bottom: 16px; }
        #searchPerson {
            width: 50%; /* Halve breedte */
            padding: 9px 12px;
            font-size: 1rem;
            border: 1px solid #bbb;
            border-radius: 5px;
            box-sizing: border-box;
        }
        #searchPerson:focus {
            outline: none;
            border-color: #1E90FF;
        }

        /* ======================= KNOPPEN ======================= */
        .knoppen-balk {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .knoppen-balk button {
            padding: 9px 18px;
            font-size: 0.95rem;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #refreshBtn { background: #6c757d; color: #fff; }
        #refreshBtn:hover { background: #5a6268; }

        #addBtn { background: #28a745; color: #fff; }
        #addBtn:hover { background: #218838; }

        #saveBtn { background: #1E90FF; color: #fff; }
        #saveBtn:hover { background: #1278d4; }

        /* ======================= SCROLL WRAPPER ======================= */
        .manage-tabel-wrapper {
            overflow-x: auto;              /* Activeert horizontale scroll */
            margin-bottom: 16px;           /* Ruimte onder tabel */
        }

        /* ======================= TABEL ======================= */
        #manageTable {
            width: 100%;                  /* Basisbreedte */
            border-collapse: collapse;    /* Geen dubbele randen */
            margin-top: 4px;
            background: transparent;
            white-space: nowrap;          /* Voorkomt afbreken → forceert scroll */
        }

        th, td {
            border: 1px solid #ddd;
            padding: 6px 8px;
            text-align: left;
            vertical-align: top;
            font-size: 0.9rem;
        }

        th {
            background: #f4f4f4;          /* Lichtgrijs — vereist RelationColors.css + style.css */
            font-weight: bold;
            color: #333;
        }

        /* ======================= TEXTAREA ======================= */
        #manageTable td textarea {
            background: transparent;
            border: none;
            width: 100%;
            box-sizing: border-box;
            resize: vertical;
            font-family: inherit;
            font-size: 0.9rem;
            padding: 2px 4px;
        }

        /* ======================= RELATIE KLEUREN ======================= */
        /* Vereisen CSS-variabelen uit RelationColors.css               */
        tr.HoofdID td  { background: var(--color-hoofd); font-weight: 500; }
        tr.VHoofdID td,
        tr.MHoofdID td { background: var(--color-vader); }
        tr.PHoofdID td { background: var(--color-partner-hoofd); font-style: italic; }
        tr.KindID td   { background: var(--color-KindID); opacity: 0.85; }
        tr.HKindID td  { background: var(--color-HKindID); }
        tr.PHKindID td { background: var(--color-PHKindID); }
        tr.Partner td  { background: var(--color-partner); font-style: italic; }
        tr.BZID td     { background: var(--color-bz); }
    </style>
</head>
<body>
<!-- ======================= source view enablement  ======================= -->
     <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
     <script>eruda.init();</script>
<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>

<!-- ======================= Navbar ======================= -->
<div id="navbar-placeholder"></div>

<!-- ======================= MAIN ======================= -->
<main>
    <div class="container">

        <!-- ======================= WELKOM ======================= -->
        <div class="welkom-blok">
            <h1>Welkom bij je stamboom Manager</h1>
            <p>Zoek een persoon op om de stamboom te beheren.</p>
        </div>

        <!-- ======================= ZOEK ======================= -->
        <div class="zoek-sectie">
            <input type="text" id="searchPerson" placeholder="Zoek op ID, naam of geboortedatum...">
        </div>

        <!-- ======================= KNOPPEN ======================= -->
        <div class="knoppen-balk">
            <button id="refreshBtn">Vernieuwen</button>
            <button id="addBtn">+ Toevoegen</button>
            <button id="saveBtn">Opslaan</button>
        </div>

        <!-- ======================= TABEL MET WRAPPER ======================= -->
        <div class="manage-tabel-wrapper"> <!-- Scroll container -->
            <table id="manageTable">
                <thead><tr></tr></thead>
                <tbody></tbody>
            </table>
        </div>

    </div>
</main>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>

<!-- =============================================================
     SCRIPTS — volgorde is verplicht:
     1. Supabase SDK        — vereist door auth.js
     2. utils.js            — vereist door alle andere modules
     3. auth.js             — vereist door topbar.js
     4. TopBar fetch        — laadt TopBar HTML, daarna topbar.js
     5. Navbar fetch        — onafhankelijk, mag parallel
     6. Footer fetch        — onafhankelijk
     7. Pagina-scripts      — altijd als laatste (volgorde verplicht)
     ============================================================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/utils.js"></script>   <!-- Eerste: hulpfuncties (safe, formatDate, parseBirthday) -->
<script src="../js/auth.js"></script>    <!-- Auth module — vereist Supabase SDK + utils.js -->

<script>
    // Stap 1: TopBar HTML laden, daarna PAS topbar.js injecteren
    // Dit garandeert dat #top-auth in de DOM zit vóór topbar.js initialiseert
    fetch('/MyFamTreeCollab/Layout/TopBar.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('topbar-placeholder').innerHTML = data; // Injecteer TopBar HTML
            var s = document.createElement('script'); // Maak script-element aan
            s.src = '../js/topbar.js';                // Wijs topbar.js toe
            document.body.appendChild(s);             // Voeg toe aan DOM — initialiseert nu veilig
        });

    // Stap 2: Navbar laden — geen auth-afhankelijkheid, mag parallel
    fetch('/MyFamTreeCollab/Layout/Navbar.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('navbar-placeholder').innerHTML = data; // Let op: kleine 'n' — komt overeen met div-ID hierboven
        });

    // Stap 3: Footer laden
    fetch('/MyFamTreeCollab/Layout/Footer.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('footer-placeholder').innerHTML = data; // Injecteer footer HTML
        });
</script>

<!-- Pagina-specifieke scripts — verplichte laadvolgorde -->
<script src="../js/schema.js"></script>        <!-- Veldnamen en CSV-parsing -->
<script src="../js/idGenerator.js"></script>   <!-- ID-generatie voor nieuwe rijen -->
<script src="../js/storage.js"></script>       <!-- localStorage API -->
<script src="../js/LiveSearch.js"></script>    <!-- Zoekfunctie -->
<script src="../js/relatieEngine.js"></script> <!-- Familierelaties berekenen -->
<script src="../js/manage.js"></script>        <!-- Pagina-logica — altijd als laatste -->

</body>
</html>

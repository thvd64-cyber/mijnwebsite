<!-- ======================= stamboom/storage.html v2.0.1 =======================
     Opslagpagina: bekijk en filter alle opgeslagen data, reset stamboom

     Wijziging v2.1.0:
     - Scroll-wrapper toegevoegd rond dynamische tabel (v2.0.1)
     - overflow-x + nowrap toegepast (zoals template.html)
     - JS aangepast zodat wrapper correct blijft bij re-render

     Scripts: schema.js → storage.js (verplichte volgorde)
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8"> <!-- Tekenset -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive -->
    <title>MyFamTreeCollab - Opslag</title>

    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">

    <style>

        /* ======================= WELKOMSTBLOK ======================= */
        .welkom-blok { margin-bottom: 20px; }
        .welkom-blok h1 { font-size: 1.4rem; font-weight: bold; margin: 0 0 8px 0; color: #222; }
        .welkom-blok p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0; }

        /* ======================= ACTIE BALK ======================= */
        .actie-balk {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .storage-info {
            font-size: 0.88rem;
            color: #666;
        }

        /* ======================= RESET KNOP ======================= */
        .btn-reset {
            padding: 8px 16px;
            background: #d9534f;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-reset:hover { background: #c9302c; }

        /* ======================= SCROLL WRAPPER ======================= */
        .storage-tabel-wrapper {
            overflow-x: auto;              /* 🔥 Activeert horizontale scroll */
            margin-top: 10px;              /* Ruimte boven tabel */
        }

        /* ======================= TABEL ======================= */
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 4px;
            font-size: 0.9rem;
            white-space: nowrap;           /* 🔥 Forceert breedte → scroll */
        }

        th, td {
            border: 1px solid #ddd;
            padding: 7px 10px;
            text-align: left;
        }

        th {
            background: #f4f4f4;
            font-weight: bold;
            color: #333;
        }

        th input {
            width: 95%;
            padding: 3px 5px;
            font-size: 0.85rem;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        .empty {
            font-style: italic;
            color: #888;
            padding: 20px 0;
        }

        @media (max-width: 768px) {
            table, th, td { font-size: 0.82rem; }
        }

    </style>
</head>

<body>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/TopBar.html') // Laad topbar
    .then(resp => resp.text())
    .then(data => document.getElementById('topbar-placeholder').innerHTML = data);
</script>

<!-- ======================= Navbar ======================= -->
<div id="Navbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Navbar.html') // Laad navbar
    .then(resp => resp.text())
    .then(data => document.getElementById('Navbar-placeholder').innerHTML = data);
</script>

<!-- ======================= MAIN ======================= -->
<main>
    <div class="container">

        <!-- ======================= WELKOM ======================= -->
        <div class="welkom-blok">
            <h1>Welkom bij je stamboom Opslag</h1>
            <p>Bekijk en filter alle opgeslagen personen.</p>
        </div>

        <!-- ======================= ACTIE BALK ======================= -->
        <div class="actie-balk">
            <button id="resetBtn" class="btn-reset">Reset stamboom</button>
            <span class="storage-info" id="storageInfo"></span>
        </div>

        <!-- ======================= CONTAINER ======================= -->
        <div id="storageContainer"></div> <!-- JS injecteert hier wrapper + tabel -->

    </div>
</main>

<!-- ======================= SCRIPTS ======================= -->
<script src="../js/schema.js"></script>
<script src="../js/storage.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function () {

    if (typeof StamboomStorage === 'undefined') {
        console.error('StamboomStorage niet geladen!');
        return;
    }

    const container = document.getElementById('storageContainer');
    const info      = document.getElementById('storageInfo');
    const resetBtn  = document.getElementById('resetBtn');

    const columns = window.StamboomSchema
        ? [...window.StamboomSchema.fields]
        : [];

    /* ======================= TABEL RENDER ======================= */
    function renderTable() {

        const data = StamboomStorage.get();
        container.innerHTML = ''; // Reset container

        info.innerHTML = `Versie: ${StamboomStorage.version} | ${data.length} records`;

        if (!data.length) {
            container.innerHTML = '<p class="empty">Geen data gevonden in localStorage.</p>';
            return;
        }

        /* ======================= WRAPPER MAKEN ======================= */
        const wrapper = document.createElement('div');        // Maak scroll container
        wrapper.className = 'storage-tabel-wrapper';          // Koppel CSS

        const table  = document.createElement('table');       // Maak tabel
        const thead  = document.createElement('thead');

        /* ======================= HEADER ======================= */
        const headerRow = document.createElement('tr');
        columns.forEach(col => {
            const th = document.createElement('th');
            th.textContent = col;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);

        /* ======================= FILTER RIJ ======================= */
        const filterRow = document.createElement('tr');
        const filters = {};

        columns.forEach(col => {
            const th = document.createElement('th');
            const input = document.createElement('input');

            input.type = 'text';
            input.placeholder = 'Filter...';

            input.addEventListener('input', function () {
                filters[col] = this.value.toLowerCase(); // Bewaar filter
                applyFilters();                          // Herfilter
            });

            th.appendChild(input);
            filterRow.appendChild(th);
        });

        thead.appendChild(filterRow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        table.appendChild(tbody);

        wrapper.appendChild(table);      // 🔥 Tabel in wrapper
        container.appendChild(wrapper); // 🔥 Wrapper in DOM

        /* ======================= FILTER LOGICA ======================= */
        function applyFilters() {

            tbody.innerHTML = '';
            const fragment = document.createDocumentFragment();

            const gefilterd = data.filter(persoon =>
                columns.every(col => {
                    if (!filters[col]) return true;
                    return (persoon[col] ?? '')
                        .toString()
                        .toLowerCase()
                        .includes(filters[col]);
                })
            );

            gefilterd.forEach(persoon => {
                const rij = document.createElement('tr');

                columns.forEach(col => {
                    const td = document.createElement('td');
                    td.textContent = persoon[col] ?? '';
                    rij.appendChild(td);
                });

                fragment.appendChild(rij);
            });

            tbody.appendChild(fragment);
        }

        applyFilters(); // Initieel renderen
    }

    /* ======================= RESET ======================= */
    resetBtn.addEventListener('click', function () {

        if (!StamboomStorage.get().length) return;

        const bevestiging =
            '⚠️ WAARSCHUWING ⚠️\n\nAlle data wordt verwijderd.\nMaak eerst een export.\nKlik OK om te bevestigen.';

        if (!confirm(bevestiging)) return;

        StamboomStorage.clear();
        renderTable();
    });

    renderTable(); // Eerste render
});
</script>

<!-- ======================= FOOTER ======================= -->
<div id="footer-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Footer.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('footer-placeholder').innerHTML = data);
</script>

</body>
</html>

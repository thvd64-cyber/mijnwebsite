<!-- ======================= js.storage.html v0.0.3 ======================= -->
<!-- Dynamische kolommen, Migratie van oude CSV's, ID-generatie uniform, Filterbare tabel, Export (new) & Reset knop, Versiebeheer -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFamTreeCollab - Opslag</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/TopBar.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('topbar-placeholder').innerHTML = data);
</script>

<!-- ======================= Navbar ======================= -->
<div id="Navbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Navbar.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('Navbar-placeholder').innerHTML = data);
</script>

<!-- ======================= Pagina Titel ======================= -->
<div id="pageTitle" style="font-size:1.5rem;font-weight:bold;margin-bottom:15px;">Opgeslagen stamboom data</div>

<!-- ======================= Hoofd Container ======================= -->
<div class="main-container">
    <div style="display:flex; justify-content:flex-start; margin-bottom:10px;">
        <button class="btn-reset" id="resetBtn">Wis alle data</button>
    </div>

    <div class="storage-info" id="storageInfo"></div> <!-- info: versie + record aantal -->
    <div id="storageContainer"></div> <!-- dynamische tabel wordt hier geplaatst -->
</div>

<!-- ======================= CSS ======================= -->
<style>
body { font-family: Arial,sans-serif; margin:0; padding:0; background:#f8f8f8; }
.main-container { width:100%; padding:20px; background:#fff; }
.storage-info { font-weight:bold; margin-bottom:15px; }
table { border-collapse: collapse; width:100%; margin-top:10px; }
th, td { border:1px solid #ccc; padding:8px; text-align:left; }
th { background:#f4f4f4; }
.empty { font-style:italic; color:#777; margin-top:20px; }
.btn-reset { padding:8px 12px; cursor:pointer; background:#d9534f; color:#fff; border:none; border-radius:4px; margin-top:15px; }
.btn-reset:hover { background:#c9302c; }
@media(max-width:768px){ table, th, td { font-size:0.9rem; } }
</style>

<!-- ======================= Scripts ======================= -->
<script src="../js/schema.js"></script> <!-- bevat FIELDS + validatie -->
<script src="../js/storage.js"></script> <!-- opslag API -->

<script>
document.addEventListener('DOMContentLoaded', function(){

    if(typeof StamboomStorage === "undefined"){
        console.error("StamboomStorage niet geladen!");
        return;
    }

    const container = document.getElementById('storageContainer');
    const info = document.getElementById('storageInfo');
    const resetBtn = document.getElementById('resetBtn');

    // kolommen dynamisch uit schema.js
    const columns = window.StamboomSchema ? [...window.StamboomSchema.fields] : [];

    function renderTable(){
        let data = StamboomStorage.get();
        container.innerHTML = "";
        info.innerHTML = `Storage versie: ${StamboomStorage.version} | Aantal records: ${data.length}`;
        if(!data.length){
            container.innerHTML = '<div class="empty">Geen data gevonden in localStorage.</div>';
            return;
        }

        const table = document.createElement('table');
        const thead = document.createElement('thead');

        // header rij
        const headerRow = document.createElement('tr');
        columns.forEach(col => {
            const th = document.createElement('th');
            th.textContent = col;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);

        // filter rij
        const filterRow = document.createElement('tr');
        const filters = {};
        columns.forEach(col=>{
            const th = document.createElement('th');
            const input = document.createElement('input');
            input.type = "text"; input.placeholder="Filter..."; input.style.width="95%";
            input.addEventListener('input', function(){ filters[col]=this.value.toLowerCase(); applyFilters(); });
            th.appendChild(input);
            filterRow.appendChild(th);
        });
        thead.appendChild(filterRow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        table.appendChild(tbody);
        container.appendChild(table);

        function applyFilters(){
            tbody.innerHTML = "";
            const fragment = document.createDocumentFragment();
            const filtered = data.filter(person => {
                return columns.every(col=>{
                    if(!filters[col]) return true;
                    const val = (person[col]??"").toString().toLowerCase();
                    return val.includes(filters[col]);
                });
            });
            filtered.forEach(person=>{
                const row = document.createElement('tr');
                columns.forEach(col=>{
                    const td = document.createElement('td');
                    td.textContent = person[col]??"";
                    row.appendChild(td);
                });
                fragment.appendChild(row);
            });
            tbody.appendChild(fragment);
        }
        applyFilters();
    }

    <!-- ======================= EXPORT EN RESET KNOPPEN ======================= -->
<div id="buttonsContainer" style="margin:10px 0;">
    <!-- EXPORT knoppen bovenaan -->
    <button id="exportJSONBtn">Export JSON</button>
    <button id="exportCSVBtn">Export CSV</button>

    <!-- RESET knop -->
    <button id="resetBtn">Reset Stamboom</button>
</div>
    
    // reset knop functionaliteit
    resetBtn.addEventListener('click', function(){
        if(!StamboomStorage.get().length) return;
        const confirmMessage = "⚠️ WAARSCHUWING ⚠️\n\nAlle opgeslagen stamboomdata wordt definitief verwijderd.\nMaak eerst een EXPORT van je data.\nKlik OK om te bevestigen.";
        if(!confirm(confirmMessage)) return;
        StamboomStorage.clear();
        renderTable();
    });

    renderTable();
});
</script>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Footer.html')
    .then(resp=>resp.text())
    .then(data=>document.getElementById('footer-placeholder').innerHTML=data);
</script>
</body>
</html>

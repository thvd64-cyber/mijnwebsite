<!-- ======================= js.storage.html v0.0.4 ======================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFamTreeCollab - Opslag v0.0.4</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/TopBar.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('topbar-placeholder').innerHTML = data);
</script>

<!-- ======================= Navbar ======================= -->
<div id="Navbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Navbar.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('Navbar-placeholder').innerHTML = data);
</script>

<!-- ======================= Pagina Titel ======================= -->
<div id="pageTitle" style="font-size:1.5rem;font-weight:bold;margin-bottom:15px;">Opgeslagen stamboom data</div>

<!-- ======================= Hoofd Container ======================= -->
<div class="main-container">

    <!-- Knoppen: Export + Reset -->
    <div id="buttonsContainer" style="margin-bottom:15px;">
        <button id="exportJSONBtn">Export JSON</button>
        <button id="exportCSVBtn">Export CSV</button>
        <button id="resetBtn">Reset Stamboom</button>
    </div>

    <!-- Storage info -->
    <div class="storage-info" id="storageInfo"></div>
    <div id="storageContainer"></div>
</div>

<!-- ======================= CSS ======================= -->
<style>
body { font-family: Arial,sans-serif; margin:0; padding:0; background:#f8f8f8; }
.main-container { width:100%; padding:20px; background:#fff; }
.storage-info { font-weight:bold; margin-bottom:15px; }
table { border-collapse: collapse; width:100%; margin-top:10px; }
th, td { border:1px solid #ccc; padding:8px; text-align:left; }
th { background:#f4f4f4; }
.empty { font-style:italic; color:#777; margin-top:20px; }
input { padding:2px 4px; }
button { cursor:pointer; padding:6px 12px; margin-right:5px; border:none; border-radius:4px; }
#exportJSONBtn, #exportCSVBtn { background:#0275d8; color:#fff; }
#exportJSONBtn:hover, #exportCSVBtn:hover { background:#025aa5; }
#resetBtn { background:#d9534f; color:#fff; }
#resetBtn:hover { background:#c9302c; }
@media(max-width:768px){ table, th, td { font-size:0.9rem; } }
</style>

<!-- ======================= Scripts ======================= -->
<script src="../js/schema.js"></script>
<script src="../js/storage.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function(){

    if(typeof StamboomStorage === "undefined"){
        console.error("StamboomStorage niet geladen!");
        return;
    }

    const container = document.getElementById('storageContainer');
    const info = document.getElementById('storageInfo');
    const resetBtn = document.getElementById('resetBtn');
    const exportJSONBtn = document.getElementById('exportJSONBtn');
    const exportCSVBtn = document.getElementById('exportCSVBtn');

    // Dynamische kolommen + _extra
    const extraColsCount = 22 - window.StamboomSchema.fields.length;
    const columns = [...window.StamboomSchema.fields];
    for(let i=0;i<extraColsCount;i++) columns.push(`_extra${i+1}`);

    const filters = {};

    function renderTable(){
        let data = StamboomStorage.get();
        container.innerHTML = "";
        info.innerHTML = `Storage versie: ${StamboomStorage.version} | Aantal records: ${data.length}`;
        if(!data.length){
            container.innerHTML = '<div class="empty">Geen data gevonden in localStorage.</div>';
            return;
        }

        const table = document.createElement('table');
        const thead = document.createElement('thead');

        // Header rij
        const headerRow = document.createElement('tr');
        columns.forEach(col=>{
            const th = document.createElement('th');
            th.textContent = col;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);

        // Filter rij
        const filterRow = document.createElement('tr');
        columns.forEach(col=>{
            const th = document.createElement('th');
            const input = document.createElement('input');
            input.type = "text";
            input.placeholder = "Filter...";
            input.style.width = "95%";
            input.addEventListener('input', function(){
                filters[col] = this.value.toLowerCase();
                applyFilters();
            });
            th.appendChild(input);
            filterRow.appendChild(th);
        });
        thead.appendChild(filterRow);

        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        table.appendChild(tbody);
        container.appendChild(table);

        function applyFilters(){
            tbody.innerHTML = "";
            const fragment = document.createDocumentFragment();
            const filtered = data.filter(person=>{
                return columns.every((col,i)=>{
                    const val = col.startsWith("_extra") ? (person._extra[i - window.StamboomSchema.fields.length] ?? "") : (person[col] ?? "");
                    return !filters[col] || val.toString().toLowerCase().includes(filters[col]);
                });
            });
            filtered.forEach(person=>{
                const row = document.createElement('tr');
                columns.forEach((col,i)=>{
                    const td = document.createElement('td');
                    td.textContent = col.startsWith("_extra") ? (person._extra[i - window.StamboomSchema.fields.length] ?? "") : (person[col] ?? "");
                    row.appendChild(td);
                });
                fragment.appendChild(row);
            });
            tbody.appendChild(fragment);
        }

        applyFilters();
    }

    // ======================= RESET KNOP =======================
    resetBtn.addEventListener('click', function(){
        if(!StamboomStorage.get().length) return;
        const confirmMessage = "⚠️ WAARSCHUWING ⚠️\n\nAlle opgeslagen stamboomdata wordt definitief verwijderd.\nMaak eerst een EXPORT van je data.\nKlik OK om te bevestigen.";
        if(!confirm(confirmMessage)) return;
        StamboomStorage.clear();
        renderTable();
    });

    // ======================= EXPORT JSON =======================
    exportJSONBtn.addEventListener('click', function(){
        const data = StamboomStorage.get();
        const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "stamboomData.json";
        a.click();
        URL.revokeObjectURL(url);
    });

    // ======================= EXPORT CSV =======================
    exportCSVBtn.addEventListener('click', function(){
        const data = StamboomStorage.get();
        if(!data.length) return;
        const allFields = [...window.StamboomSchema.fields];
        const extraCount = 22 - allFields.length;
        for(let i=0;i<extraCount;i++) allFields.push(`_extra${i+1}`);
        const rows = [];
        rows.push(allFields.map(f=>`"${f}"`).join(",")); // header
        data.forEach(person=>{
            const row = allFields.map((col,i)=>{
                const val = col.startsWith("_extra") ? (person._extra[i - window.StamboomSchema.fields.length] ?? "") : (person[col] ?? "");
                return `"${String(val).replace(/"/g,'""')}"`;
            });
            rows.push(row.join(","));
        });
        const blob = new Blob([rows.join("\n")],{type:"text/csv"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "stamboomData.csv";
        a.click();
        URL.revokeObjectURL(url);
    });

    renderTable();
});
</script>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Footer.html')
    .then(resp=>resp.text())
    .then(data=>document.getElementById('footer-placeholder').innerHTML=data);
</script>
</body>
</html>

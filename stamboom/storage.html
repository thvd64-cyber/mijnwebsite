<!-- ======================= storage.html v1.0 ======================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFamTreeCollab - Opslag</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
    /* ======================= BASIS STIJL ======================= */
    body { font-family: Arial,sans-serif; margin:0; padding:0; background:#f8f8f8; }
    .main-container { width:100%; padding:20px; background:#fff; }
    .storage-info { font-weight:bold; margin-bottom:15px; }
    table { border-collapse: collapse; width:100%; margin-top:10px; }
    th, td { border:1px solid #ccc; padding:8px; text-align:left; }
    th { background:#f4f4f4; }
    .empty { font-style:italic; color:#777; margin-top:20px; }
    button { padding:8px 12px; cursor:pointer; border:none; border-radius:4px; }
    .btn-reset { background:#d9534f; color:#fff; }
    .btn-reset:hover { background:#c9302c; }
    #buttonsContainer { margin-bottom:10px; display:flex; gap:10px; flex-wrap:wrap; }
    #exportJSONBtn { background:#0275d8; color:#fff; }
    #exportJSONBtn:hover { background:#025aa5; }
    #exportCSVBtn { background:#5bc0de; color:#fff; }
    #exportCSVBtn:hover { background:#31b0d5; }
    @media(max-width:768px){ table, th, td { font-size:0.9rem; } }
    </style>
</head>
<body>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/TopBar.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('topbar-placeholder').innerHTML = data);
</script>

<!-- ======================= Navbar ======================= -->
<div id="Navbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Navbar.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('Navbar-placeholder').innerHTML = data);
</script>

<!-- ======================= Pagina Titel ======================= -->
<div id="pageTitle" style="font-size:1.5rem;font-weight:bold;margin-bottom:15px;">
    Opgeslagen stamboom data
</div>

<!-- ======================= Hoofd Container ======================= -->
<div class="main-container">

    <!-- ======================= KNOPPEN ======================= -->
    <div id="buttonsContainer">
        <button id="exportJSONBtn">Export JSON</button>
        <button id="exportCSVBtn">Export CSV</button>
        <button id="resetBtn" class="btn-reset">Reset Stamboom</button>
    </div>

    <div class="storage-info" id="storageInfo"></div> <!-- info: versie + record aantal -->
    <div id="storageContainer"></div> <!-- dynamische tabel wordt hier geplaatst -->

</div>

<!-- ======================= Scripts (volgorde verplicht) ======================= -->
<script src="../js/schema.js"></script>       <!-- Laad eerst het schema met veldnamen -->
<script src="../js/storage.js"></script>      <!-- Laad dan de storage API (StamboomStorage) -->
<script src="../js/export.js"></script>       <!-- Laad de centrale exportmodule (ExportModule) -->

<script>
document.addEventListener('DOMContentLoaded', function () {

    if (typeof StamboomStorage === 'undefined') {                         // Controleer of storage.js correct geladen is
        console.error('StamboomStorage niet geladen!');                   // Log fout als storage ontbreekt
        return;                                                           // Stop als storage niet beschikbaar is
    }

    const container     = document.getElementById('storageContainer');   // Container voor de datatable
    const info          = document.getElementById('storageInfo');         // Element voor versie + recordtelling
    const resetBtn      = document.getElementById('resetBtn');            // Reset-knop
    const exportJSONBtn = document.getElementById('exportJSONBtn');       // JSON-exportknop
    const exportCSVBtn  = document.getElementById('exportCSVBtn');        // CSV-exportknop

    const columns = window.StamboomSchema                                 // Haal kolomnamen op uit het centrale schema
        ? [...window.StamboomSchema.fields]                               // Gebruik de officiële veldlijst als schema.js geladen is
        : [];                                                             // Lege array als schema ontbreekt

    /* ======================= TABEL RENDEREN ======================= */
    function renderTable() {
        const data = StamboomStorage.get();                               // Haal de volledige dataset op uit localStorage
        container.innerHTML = '';                                         // Leeg de container voor een nieuwe render
        info.innerHTML = `Storage versie: ${StamboomStorage.version} | Aantal records: ${data.length}`; // Toon versie en recordtelling

        if (!data.length) {                                               // Geen data aanwezig
            container.innerHTML = '<div class="empty">Geen data gevonden in localStorage.</div>';
            return;
        }

        const table = document.createElement('table');                   // Maak de tabelcontainer
        const thead = document.createElement('thead');                   // Maak de thead voor koppen en filters

        const headerRow = document.createElement('tr');                  // Rij voor kolomtitels
        columns.forEach(col => {                                          // Loop door alle kolomnamen
            const th = document.createElement('th');                     // Maak een koptekstcel
            th.textContent = col;                                         // Zet de kolomnaam als tekst
            headerRow.appendChild(th);                                   // Voeg de cel toe aan de headerrij
        });
        thead.appendChild(headerRow);                                    // Voeg de headerrij toe aan de thead

        const filterRow = document.createElement('tr');                  // Tweede rij: filterinputs per kolom
        const filters   = {};                                             // Object om actieve filterwaarden bij te houden
        columns.forEach(col => {                                          // Loop door alle kolommen
            const th    = document.createElement('th');                  // Filtercel
            const input = document.createElement('input');               // Tekstinvoerveld voor de filter
            input.type        = 'text';
            input.placeholder = 'Filter...';
            input.style.width = '95%';
            input.addEventListener('input', function () {                // Luister naar elke toetsaanslag
                filters[col] = this.value.toLowerCase();                 // Sla filterwaarde op in kleine letters
                applyFilters();                                          // Herfilter de tabel
            });
            th.appendChild(input);
            filterRow.appendChild(th);
        });
        thead.appendChild(filterRow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');                   // Maak de tabelinhoud container
        table.appendChild(tbody);
        container.appendChild(table);

        function applyFilters() {                                        // Herrendert tabelinhoud op basis van actieve filters
            tbody.innerHTML = '';
            const fragment  = document.createDocumentFragment();         // Fragment voor betere performance
            const gefilterd = data.filter(persoon =>
                columns.every(col => {
                    if (!filters[col]) return true;                      // Geen filter: persoon mag door
                    const waarde = (persoon[col] ?? '').toString().toLowerCase();
                    return waarde.includes(filters[col]);                // Controleer of waarde de filterterm bevat
                })
            );
            gefilterd.forEach(persoon => {
                const rij = document.createElement('tr');
                columns.forEach(col => {
                    const td = document.createElement('td');
                    td.textContent = persoon[col] ?? '';                 // Lege string als veld ontbreekt
                    rij.appendChild(td);
                });
                fragment.appendChild(rij);
            });
            tbody.appendChild(fragment);                                 // Voeg alle rijen in één keer toe
        }
        applyFilters();                                                   // Render tabel direct bij laden
    }

    /* ======================= EXPORT KNOPPEN → centrale export.js ======================= */
    exportCSVBtn.addEventListener('click', function () {                  // Luister naar klik op CSV-knop
        window.ExportModule.exportCSV();                                  // Roep centrale CSV-exportfunctie aan
    });

    exportJSONBtn.addEventListener('click', function () {                 // Luister naar klik op JSON-knop
        window.ExportModule.exportJSON();                                 // Roep centrale JSON-exportfunctie aan
    });

    /* ======================= RESET KNOP ======================= */
    resetBtn.addEventListener('click', function () {                      // Luister naar klik op reset-knop
        if (!StamboomStorage.get().length) return;                        // Niets te resetten als er geen data is
        const bevestiging = '⚠️ WAARSCHUWING ⚠️\n\nAlle opgeslagen stamboomdata wordt definitief verwijderd.\nMaak eerst een EXPORT van je data.\nKlik OK om te bevestigen.';
        if (!confirm(bevestiging)) return;                                // Stop als gebruiker annuleert
        StamboomStorage.clear();                                          // Verwijder alle data uit localStorage
        renderTable();                                                    // Herrender de lege tabel
    });

    renderTable();                                                        // Render tabel bij paginaladen
});
</script>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Footer.html')
    .then(resp=>resp.text())
    .then(data=>document.getElementById('footer-placeholder').innerHTML=data);
</script>

</body>
</html>

<!-- ======================= stamboom/storage.html v2.0.0 =======================
     Opslagpagina: bekijk en filter alle opgeslagen data, reset stamboom
     Wijziging v2.0.0: facelift — welkomstblok, paginatitel div verwijderd,
                       main-container → container klasse, inline stijlen naar <style>
     Scripts: schema.js → storage.js (verplichte volgorde)
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFamTreeCollab - Opslag</title>
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* ======================= WELKOMSTBLOK ======================= */
        .welkom-blok { margin-bottom: 20px; }
        .welkom-blok h1 { font-size: 1.4rem; font-weight: bold; margin: 0 0 8px 0; color: #222; }
        .welkom-blok p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0; }

        /* ======================= ACTIE BALK ======================= */
        .actie-balk {                                                      /* Balk met knop en info boven de tabel */
            display: flex;                                                 /* Knop en info naast elkaar */
            align-items: center;                                           /* Verticaal uitlijnen */
            gap: 16px;                                                     /* Ruimte tussen knop en info */
            margin-bottom: 16px;                                           /* Ruimte onder de balk */
            flex-wrap: wrap;                                               /* Op mobiel onder elkaar */
        }
        .storage-info {                                                    /* Versie + recordtelling */
            font-size: 0.88rem;                                            /* Klein maar leesbaar */
            color: #666;                                                   /* Grijs voor secundaire info */
        }

        /* ======================= RESET KNOP ======================= */
        .btn-reset {                                                       /* Rode verwijderknop */
            padding: 8px 16px;                                             /* Klikgebied */
            background: #d9534f;                                           /* Rood voor destructieve actie */
            color: #fff;                                                   /* Witte tekst */
            border: none;                                                  /* Geen rand */
            border-radius: 4px;                                            /* Afgeronde hoeken */
            font-size: 0.9rem;                                             /* Leesbaar */
            font-weight: bold;                                             /* Vetgedrukt */
            cursor: pointer;                                               /* Handje bij hover */
        }
        .btn-reset:hover { background: #c9302c; }                         /* Donkerder rood bij hover */

        /* ======================= TABEL ======================= */
        table { border-collapse: collapse; width: 100%; margin-top: 4px; font-size: 0.9rem; } /* Volledige breedte tabel */
        th, td { border: 1px solid #ddd; padding: 7px 10px; text-align: left; }               /* Cel opmaak */
        th { background: #f4f4f4; font-weight: bold; color: #333; }                           /* Kolomkop achtergrond */
        th input { width: 95%; padding: 3px 5px; font-size: 0.85rem; border: 1px solid #ccc; border-radius: 3px; } /* Filterinput */
        .empty { font-style: italic; color: #888; padding: 20px 0; }                          /* Lege staat melding */

        @media (max-width: 768px) { table, th, td { font-size: 0.82rem; } }                  /* Kleinere tekst op mobiel */
    </style>
</head>
<body>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/TopBar.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('topbar-placeholder').innerHTML = data);
</script>

<!-- ======================= Navbar ======================= -->
<div id="Navbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Navbar.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('Navbar-placeholder').innerHTML = data);
</script>

<!-- ======================= Hoofd content ======================= -->
<main>
    <div class="container">

        <!-- ======================= Welkomstblok ======================= -->
        <div class="welkom-blok">
            <h1>Welkom bij Opslag</h1>
            <p>
                Bekijk en filter alle opgeslagen personen in je stamboom.
                Gebruik de filterrij om snel te zoeken binnen de data.
                Via de <a href="../home/export.html">exportpagina</a> kun je je data downloaden.
            </p>
        </div>

        <!-- ======================= Actie balk ======================= -->
        <div class="actie-balk">
            <button id="resetBtn" class="btn-reset">Reset stamboom</button> <!-- Verwijdert alle data na bevestiging -->
            <span class="storage-info" id="storageInfo"></span>             <!-- Versie en recordtelling verschijnen hier -->
        </div>

        <!-- ======================= Datatable (gevuld door JS) ======================= -->
        <div id="storageContainer"></div>                                   <!-- JS bouwt hier de filterbare tabel -->

    </div>
</main>

<!-- ======================= Scripts (volgorde verplicht) ======================= -->
<script src="../js/schema.js"></script>       <!-- Laad eerst het schema met veldnamen -->
<script src="../js/storage.js"></script>      <!-- Laad dan de storage API (StamboomStorage) -->

<script>
document.addEventListener('DOMContentLoaded', function () {

    if (typeof StamboomStorage === 'undefined') {                         // Controleer of storage.js correct geladen is
        console.error('StamboomStorage niet geladen!');
        return;
    }

    const container = document.getElementById('storageContainer');        // Container voor de datatable
    const info      = document.getElementById('storageInfo');             // Element voor versie + recordtelling
    const resetBtn  = document.getElementById('resetBtn');                // Reset-knop

    const columns = window.StamboomSchema                                 // Haal kolomnamen op uit het centrale schema
        ? [...window.StamboomSchema.fields]
        : [];

    /* ======================= TABEL RENDEREN ======================= */
    function renderTable() {
        const data = StamboomStorage.get();                               // Haal de volledige dataset op uit localStorage
        container.innerHTML = '';                                         // Leeg de container voor een nieuwe render
        info.innerHTML = `Versie: ${StamboomStorage.version} &nbsp;|&nbsp; ${data.length} records`; // Toon versie en aantal

        if (!data.length) {                                               // Geen data aanwezig
            container.innerHTML = '<p class="empty">Geen data gevonden in localStorage.</p>';
            return;
        }

        const table  = document.createElement('table');
        const thead  = document.createElement('thead');

        const headerRow = document.createElement('tr');                  // Rij met kolomtitels
        columns.forEach(col => {
            const th = document.createElement('th');
            th.textContent = col;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);

        const filterRow = document.createElement('tr');                  // Rij met filterinputs
        const filters   = {};
        columns.forEach(col => {
            const th    = document.createElement('th');
            const input = document.createElement('input');
            input.type        = 'text';
            input.placeholder = 'Filter...';
            input.addEventListener('input', function () {
                filters[col] = this.value.toLowerCase();
                applyFilters();
            });
            th.appendChild(input);
            filterRow.appendChild(th);
        });
        thead.appendChild(filterRow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        table.appendChild(tbody);
        container.appendChild(table);

        function applyFilters() {
            tbody.innerHTML = '';
            const fragment  = document.createDocumentFragment();
            const gefilterd = data.filter(persoon =>
                columns.every(col => {
                    if (!filters[col]) return true;
                    return (persoon[col] ?? '').toString().toLowerCase().includes(filters[col]);
                })
            );
            gefilterd.forEach(persoon => {
                const rij = document.createElement('tr');
                columns.forEach(col => {
                    const td = document.createElement('td');
                    td.textContent = persoon[col] ?? '';
                    rij.appendChild(td);
                });
                fragment.appendChild(rij);
            });
            tbody.appendChild(fragment);
        }
        applyFilters();
    }

    /* ======================= RESET KNOP ======================= */
    resetBtn.addEventListener('click', function () {
        if (!StamboomStorage.get().length) return;                        // Niets te resetten als er geen data is
        const bevestiging = '⚠️ WAARSCHUWING ⚠️\n\nAlle stamboomdata wordt definitief verwijderd.\nMaak eerst een export via de exportpagina.\nKlik OK om te bevestigen.';
        if (!confirm(bevestiging)) return;                                // Stop als gebruiker annuleert
        StamboomStorage.clear();                                          // Verwijder alle data
        renderTable();                                                    // Herrender de lege tabel
    });

    renderTable();                                                        // Render tabel bij paginaladen
});
</script>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Footer.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('footer-placeholder').innerHTML = data);
</script>

</body>
</html>
